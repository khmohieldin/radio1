<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>راديو الإذاعات المصرية</title>
    
    <!-- تضمين مكتبة Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تضمين مكتبة أيقونات Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* التعديل على السكرول */
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a0f0a; border-radius: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.8); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #d4af37, #996515); border-radius: 10px; border: 2px solid #2b1810; }
        
        .custom-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px; width: 18px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f3e5ab, #d4af37, #996515);
            border: 2px solid #2b1810; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.8), inset 0 2px 2px rgba(255,255,255,0.6);
        }

        /* ستايلات الراديو القديم */
        .wood-panel {
            background-color: #3e2723;
            background-image: 
                repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 10px),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 6px), 
                linear-gradient(to bottom, #4e342e, #3e2723, #21110b);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.95);
            border: 6px solid #1a0f0a; border-radius: 16px; position: relative;
        }
        .glass-hollow {
            background: linear-gradient(135deg, #1f140e 0%, #0a0502 100%);
            box-shadow: inset 0 8px 25px rgba(0,0,0,1), inset 0 0 15px rgba(255, 160, 0, 0.15);
            border: 3px solid #080402; border-radius: 8px; position: relative;
        }
        .vintage-btn {
            background: linear-gradient(to bottom, #f3e5ab, #d4af37, #996515);
            border: 2px solid #2b1810;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.8), 0 4px 0 #4a3018, 0 8px 15px rgba(0,0,0,0.8);
            color: #1a0f0a !important; text-shadow: 0 1px 0 rgba(255,255,255,0.5);
            transition: all 0.15s; font-weight: 900; border-radius: 6px;
        }
        .vintage-btn:active {
            transform: translateY(4px);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.6), 0 0 0 #4a3018;
        }
        
        body {
            background-color: #0d0704;
            background-image: radial-gradient(circle at 50% 30%, #3e2415 0%, #0a0502 80%);
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body class="min-h-screen text-amber-50 selection:bg-amber-900/50 flex flex-col p-4 sm:p-8">

    <!-- حاوية الإشعارات -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div class="max-w-5xl mx-auto w-full space-y-8 mt-4 sm:mt-0">

        <!-- الترويسة -->
        <header class="flex flex-col sm:flex-row items-center justify-between pb-6 border-b border-gray-800 gap-4">
            <div class="flex items-center gap-4 glass-hollow px-6 py-4 rounded-2xl w-full sm:w-auto">
                <div class="w-14 h-14 rounded-full bg-gradient-to-br from-amber-400 to-amber-700 flex items-center justify-center shadow-[0_0_15px_rgba(212,175,55,0.4)] border-2 border-[#2c1810]">
                    <i data-lucide="radio" class="w-7 h-7 text-[#2c1810]"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-b from-[#f3e5ab] via-[#d4af37] to-[#996515] drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                        باقة الإذاعات المصرية
                    </h1>
                    <p class="text-sm text-amber-200/70 mt-1">رحلة عبر الأثير مع إذاعات الزمن الجميل</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- القسم الأيمن: المشغل -->
            <div class="lg:col-span-5 space-y-6">
                <div class="wood-panel rounded-3xl p-6 shadow-2xl relative">
                    
                    <div id="playing-glow" class="hidden">
                        <div class="absolute top-0 right-0 w-48 h-48 bg-amber-500/20 blur-[60px] rounded-full pointer-events-none"></div>
                        <div class="absolute bottom-0 left-0 w-48 h-48 bg-orange-600/20 blur-[60px] rounded-full pointer-events-none"></div>
                    </div>

                    <div class="relative z-10 flex flex-col items-center text-center space-y-6">
                        
                        <!-- محاكي ذبذبات الصوت -->
                        <canvas id="visualizer" class="w-full h-16 mb-2 opacity-50 transition-opacity duration-500" width="400" height="60"></canvas>

                        <!-- شاشة المشغل المدمجة -->
                        <div id="screen-container" class="w-64 h-40 sm:w-72 sm:h-44 rounded-2xl border-4 border-gray-800 flex items-center justify-center bg-black transition-all duration-500 overflow-hidden shadow-xl relative group z-20">
                            
                            <!-- إطار ديليموشن المباشر (تم تحديث الخصائص لإزالة تحذيرات المتصفح) -->
                            <iframe id="dm-iframe" class="w-full h-full absolute inset-0 z-10 hidden" frameborder="0" allow="autoplay; fullscreen"></iframe>
                            
                            <!-- أيقونة تظهر قبل تحديد الإذاعة -->
                            <div id="default-icon-container" class="absolute inset-0 z-0 flex items-center justify-center bg-[#111]">
                                <i data-lucide="tv" class="w-12 h-12 text-gray-700"></i>
                            </div>
                        </div>

                        <!-- معلومات المقطع -->
                        <div class="w-full glass-hollow p-5 rounded-xl">
                            <span id="status-badge" class="inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-red-900/40 text-red-400 border border-red-700/50">متوقف</span>
                            <h2 id="track-title" class="text-xl font-bold text-amber-400 text-shadow mb-2" style="font-family: 'Courier New', monospace;">
                                اختر إذاعة للبدء
                            </h2>
                            <div class="flex items-center justify-center gap-2 text-sm text-amber-200/50">
                                <i data-lucide="radio-receiver" class="w-4 h-4"></i>
                                <span>البث المباشر</span>
                            </div>
                        </div>

                        <!-- التحكم بمستوى الصوت الخارجي -->
                        <div class="w-full px-4" dir="ltr">
                            <div class="flex items-center gap-3 glass-hollow p-3 rounded-xl">
                                <button id="btn-mute" class="text-amber-500 hover:text-amber-300">
                                    <i id="volume-icon" data-lucide="volume-2" class="w-5 h-5"></i>
                                </button>
                                <input type="range" id="volume-slider" min="0" max="100" value="100" class="flex-1 h-1.5 bg-[#1a0f0a] border border-[#3e2723] rounded-lg appearance-none cursor-pointer custom-range" />
                            </div>
                        </div>

                        <!-- أزرار التشغيل الأساسية للتصميم -->
                        <div class="flex items-center justify-center gap-6 w-full pt-2">
                            <button id="btn-play-pause" class="w-16 h-16 rounded-full vintage-btn flex items-center justify-center transition-all opacity-50 pointer-events-none shadow-lg">
                                <svg id="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                <svg id="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                            </button>
                        </div>

                    </div>
                </div>
            </div>

            <!-- القسم الأيسر: قائمة الإذاعات -->
            <div class="lg:col-span-7">
                <div class="wood-panel rounded-2xl overflow-hidden flex flex-col h-[650px] shadow-xl">
                    <div class="p-5 glass-hollow flex items-center justify-between border-b-4 border-[#1a0f0a]">
                        <h3 class="font-bold text-gray-100 flex items-center gap-3 text-xl">
                            <i data-lucide="list-music" class="w-6 h-6 text-amber-400"></i> القائمة الإذاعية
                        </h3>
                        <span class="bg-[#111] px-3 py-1 rounded-lg text-amber-500 font-mono text-sm border border-[#333]">8 إذاعات</span>
                    </div>

                    <div id="playlist-container" class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-3 relative z-10 bg-[#111]/80">
                        <!-- سيتم توليد المحطات هنا عبر الجافاسكربت -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // تهيئة أيقونات Lucide
        lucide.createIcons();

        // بيانات الإذاعات والروابط
        const stations = [
            { id: 'x8n6dt3', title: 'إذاعة البرنامج العام', color: 'from-blue-900 to-blue-700' },
            { id: 'x8n6dqq', title: 'إذاعة صوت العرب', color: 'from-orange-900 to-orange-700' },
            { id: 'x8n6drt', title: 'إذاعة الشرق الأوسط', color: 'from-purple-900 to-purple-700' },
            { id: 'x8n6dzo', title: 'إذاعة الشباب والرياضة', color: 'from-green-900 to-green-700' },
            { id: 'x8n6dyz', title: 'إذاعة الأغاني', color: 'from-pink-900 to-pink-700' },
            { id: 'x8n6eci', title: 'إذاعة البرنامج الثقافي', color: 'from-teal-900 to-teal-700' },
            { id: 'x8n6ebs', title: 'إذاعة القاهرة الكبرى', color: 'from-indigo-900 to-indigo-700' },
            { id: 'x9p4ebk', title: 'إذاعة الوادي الجديد', color: 'from-amber-900 to-amber-700' },
        ];

        // المتغيرات العامة
        let currentStationIndex = -1;
        let isPlaying = false;
        let volume = 100;
        let isMuted = false;
        
        // عناصر واجهة المستخدم
        const dmIframe = document.getElementById('dm-iframe');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const trackTitle = document.getElementById('track-title');
        const screenContainer = document.getElementById('screen-container');
        const defaultIconContainer = document.getElementById('default-icon-container');
        const statusBadge = document.getElementById('status-badge');
        const playingGlow = document.getElementById('playing-glow');
        const playlistContainer = document.getElementById('playlist-container');
        const volumeSlider = document.getElementById('volume-slider');
        const btnMute = document.getElementById('btn-mute');
        const volumeIcon = document.getElementById('volume-icon');

        // دالة موثوقة لإرسال الأوامر لديليموشن بجميع الصيغ التي يدعمها المشغل القديم والحديث
        function sendDMCommand(command, param) {
            if (!dmIframe.contentWindow) return;
            
            // 1. الصيغة الكلاسيكية: إرسال كنص مباشر مدعوم بـ api=postMessage
            let msg = command;
            if (param !== undefined) {
                msg += '=' + param;
            }
            dmIframe.contentWindow.postMessage(msg, '*');
            
            // 2. الصيغة الحديثة للمشغلات الجديدة (Geo Player): إرسال كـ JSON
            try {
                const jsonObj = { command: command };
                if (param !== undefined) jsonObj.parameters = [param];
                dmIframe.contentWindow.postMessage(JSON.stringify(jsonObj), '*');
            } catch(e) {}
        }

        // رسم القائمة
        window.renderPlaylist = function() {
            playlistContainer.innerHTML = stations.map((station, index) => {
                const isActive = index === currentStationIndex;
                const activeClass = isActive ? 'border-amber-500 bg-[#2b1810]' : 'border-[#333] bg-[#1a1a1a] hover:bg-[#222]';
                const textClass = isActive ? 'text-amber-400' : 'text-gray-200';
                const iconOrEq = isActive && isPlaying 
                    ? `<div class="flex items-end justify-center gap-1 h-5 w-5">
                        <div class="w-1 bg-amber-400 animate-[bounce_1s_infinite]"></div>
                        <div class="w-1 bg-amber-400 animate-[bounce_1s_infinite_0.2s]"></div>
                        <div class="w-1 bg-amber-400 animate-[bounce_1s_infinite_0.4s]"></div>
                       </div>`
                    : `<i data-lucide="${isActive ? 'pause-circle' : 'play-circle'}" class="w-6 h-6 ${isActive ? 'text-amber-400' : 'text-gray-500'}"></i>`;

                return `
                    <div onclick="window.selectStation(${index})" class="flex items-center gap-4 p-4 rounded-xl border ${activeClass} cursor-pointer transition-all shadow-md group">
                        <div class="w-12 h-12 rounded-lg bg-gradient-to-br ${station.color} flex items-center justify-center shadow-inner shrink-0 group-hover:scale-105 transition-transform border border-black/50">
                            <i data-lucide="radio" class="w-6 h-6 text-white/80"></i>
                        </div>
                        <div class="flex-1 min-w-0 text-right">
                            <h4 class="text-lg font-bold ${textClass} truncate">${station.title}</h4>
                            <p class="text-xs text-gray-400 truncate mt-1">بث مباشر - الهيئة الوطنية للإعلام</p>
                        </div>
                        <div class="shrink-0 flex items-center justify-center w-10">
                            ${iconOrEq}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons({ root: playlistContainer });
        }

        // تهيئة واختيار المحطة
        window.selectStation = function(index) {
            currentStationIndex = index;
            const station = stations[index];
            
            // تحديث واجهة المستخدم
            trackTitle.innerText = station.title;
            btnPlayPause.classList.remove('opacity-50', 'pointer-events-none');
            defaultIconContainer.classList.add('hidden');
            dmIframe.classList.remove('hidden');
            
            statusBadge.innerText = 'جاري الاتصال...';
            statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-yellow-900/40 text-yellow-400 border border-yellow-700/50';

            // دمج المشغل مباشرة.
            // muteParam يُحدد إذا كان الصوت سيبدأ مكتوماً أم لا بناءً على اختيار المستخدم من الشريط.
            const muteParam = isMuted ? '1' : '0';
            
            // قمنا بإضافة api=postMessage لتمكين استقبال الأوامر 
            dmIframe.src = `https://www.dailymotion.com/embed/video/${station.id}?api=postMessage&autoplay=1&mute=${muteParam}&controls=1&ui-logo=0`;

            isPlaying = false;
            updatePlayerUI();
            window.renderPlaylist();
        }

        // الاستماع لأحداث المشغل من الـ Iframe لتحديث الواجهة
        window.addEventListener('message', (event) => {
            if (!event.origin.includes('dailymotion.com')) return;

            let eventName = '';
            
            // معالجة الرسائل الواردة من مشغل ديليموشن بأي صيغة (Query String أو JSON)
            try {
                if (typeof event.data === 'string') {
                    if (event.data.includes('event=')) {
                        const params = new URLSearchParams(event.data);
                        eventName = params.get('event');
                    } else if (event.data.startsWith('{')) {
                        const parsed = JSON.parse(event.data);
                        eventName = parsed.event || parsed.type;
                    }
                } else if (event.data && typeof event.data === 'object') {
                    eventName = event.data.event || event.data.type;
                }
            } catch(e) {}

            if (!eventName) return;

            if (eventName === 'play' || eventName === 'playing' || eventName === 'video_start') {
                isPlaying = true;
                updatePlayerUI();
                statusBadge.innerText = 'بث مباشر 🔴';
                statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-red-900/40 text-red-400 border border-red-700/50';
            } 
            else if (eventName === 'pause' || eventName === 'video_end') {
                isPlaying = false;
                updatePlayerUI();
                statusBadge.innerText = 'متوقف';
                statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-gray-900/40 text-gray-400 border border-gray-700/50';
            }
        });

        function updatePlayerUI() {
            if (isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                screenContainer.classList.add('border-amber-500', 'shadow-[0_0_30px_rgba(245,158,11,0.5)]');
                screenContainer.classList.remove('border-gray-800');
                playingGlow.classList.remove('hidden');
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
                screenContainer.classList.remove('border-amber-500', 'shadow-[0_0_30px_rgba(245,158,11,0.5)]');
                screenContainer.classList.add('border-gray-800');
                playingGlow.classList.add('hidden');
            }
            window.renderPlaylist();
        }

        // --- ربط الأزرار الخارجية بـ Iframe ---

        btnPlayPause.addEventListener('click', () => {
            if (currentStationIndex === -1) return;
            sendDMCommand(isPlaying ? 'pause' : 'play');
        });

        volumeSlider.addEventListener('input', (e) => {
            volume = parseInt(e.target.value);
            isMuted = volume === 0;
            updateVolumeIcon();
            
            // إرسال قيم الصوت (من 0.0 إلى 1.0)
            sendDMCommand('volume', volume / 100);
            sendDMCommand('muted', isMuted ? 'true' : 'false');
        });

        btnMute.addEventListener('click', () => {
            isMuted = !isMuted;
            if (!isMuted && volume === 0) volume = 50; 
            volumeSlider.value = isMuted ? 0 : volume;
            updateVolumeIcon();
            
            sendDMCommand('muted', isMuted ? 'true' : 'false');
            if (!isMuted) sendDMCommand('volume', volume / 100);
        });

        function updateVolumeIcon() {
            let icon = 'volume-2';
            if (isMuted || volume == 0) icon = 'volume-x';
            else if (volume < 50) icon = 'volume-1';
            volumeIcon.setAttribute('data-lucide', icon);
            lucide.createIcons({ root: btnMute });
        }

        // محاكي الذبذبات الوهمي (Visualizer)
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        
        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const barWidth = 6;
            const barSpacing = 3;
            const numBars = canvas.width / (barWidth + barSpacing);
            
            for (let i = 0; i < numBars; i++) {
                let barHeight = 2; // الارتفاع الافتراضي
                
                if (isPlaying) {
                    barHeight = Math.random() * (canvas.height - 10) + 10;
                    const gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
                    gradient.addColorStop(0, '#d4af37'); 
                    gradient.addColorStop(0.5, '#f59e0b'); 
                    gradient.addColorStop(1, '#ef4444'); 
                    ctx.fillStyle = gradient;
                } else {
                    ctx.fillStyle = '#4a3018'; 
                }
                
                ctx.fillRect(i * (barWidth + barSpacing), canvas.height - barHeight, barWidth, barHeight);
            }
        }

        // بدء البرنامج
        window.renderPlaylist();
        drawVisualizer();

    </script>
</body>
</html>
