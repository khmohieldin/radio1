<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- تضمين مكتبة Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تضمين مكتبة أيقونات Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* التعديل على السكرول */
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a0f0a; border-radius: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.8); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #d4af37, #996515); border-radius: 10px; border: 2px solid #2b1810; }
        
        .custom-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px; width: 18px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f3e5ab, #d4af37, #996515);
            border: 2px solid #2b1810; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.8), inset 0 2px 2px rgba(255,255,255,0.6);
        }

        .vintage-btn:active {
            transform: translateY(4px);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.6), 0 0 0 #4a3018;
        }

        /* ستايل الزر الذهبي الجديد (الرف) */
        .gold-btn-3d {
            background: linear-gradient(to bottom, #fae596 0%, #dcb348 40%, #c29528 100%);
            border: 1px solid #5a3d13;
            border-radius: 8px;
            box-shadow: 
                inset 0 2px 1px rgba(255, 255, 255, 0.8),
                0 4px 0 #613e10,
                0 6px 10px rgba(0, 0, 0, 0.6);
            color: #1a0f0a !important;
            text-shadow: 0 1px 0 rgba(255,255,255,0.4);
            transition: all 0.1s;
        }
        .gold-btn-3d:active {
            transform: translateY(4px);
            box-shadow: 
                inset 0 2px 1px rgba(255, 255, 255, 0.8),
                0 0 0 #613e10, 
                0 2px 4px rgba(0, 0, 0, 0.6);
        }
        
        /* ستايلات الهيدر الجديد (راديو خالد) */
        .glossy-header {
            background: linear-gradient(to bottom, #1c110a 0%, #0a0502 50%, #050201 100%);
            border: 1px solid #2b1810;
            border-radius: 16px;
            box-shadow: inset 0 2px 1px rgba(255,255,255,0.05), 0 8px 20px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }
        .glossy-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            pointer-events: none;
        }
        .gold-icon-bg {
            background: repeating-linear-gradient(
                0deg,
                #d4af37,
                #d4af37 3px,
                #b8860b 3px,
                #b8860b 6px
            );
            box-shadow: inset 0 0 10px rgba(0,0,0,0.7), 0 0 20px rgba(212,175,55,0.3);
            border: 2px solid #5a3d13;
        }

        /* ستايلات الراديو القديم */
        .wood-panel {
            background-color: #3e2723;
            background-image: 
                repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 10px),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 6px), 
                linear-gradient(to bottom, #4e342e, #3e2723, #21110b);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.95);
            border: 6px solid #1a0f0a; border-radius: 16px; position: relative;
        }
        .glass-hollow {
            background: linear-gradient(135deg, #1f140e 0%, #0a0502 100%);
            box-shadow: inset 0 8px 25px rgba(0,0,0,1), inset 0 0 15px rgba(255, 160, 0, 0.15);
            border: 3px solid #080402; border-radius: 8px; position: relative;
        }
        
        body {
            background-color: #0d0704;
            background-image: radial-gradient(circle at 50% 30%, #3e2415 0%, #0a0502 80%);
            font-family: 'Georgia', serif;
        }

        /* تنسيق النافذة المنبثقة (Modal) */
        .modal-overlay {
            backdrop-filter: blur(5px);
        }
        
        /* حركة أيقونة البث المباشر */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        .animate-pulse-ring { animation: pulse-ring 2s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen text-amber-50 selection:bg-amber-900/50 flex flex-col p-2 sm:p-4">

                        <!-- شاشة المشغل المدمجة -->

                            </div>

                        <!-- معلومات المقطع -->

    <!-- استخدام النوع module لتشغيل استيرادات Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        lucide.createIcons();

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDdXHeyt16G5hpAsXbiBOmfPSGmEUaRCco",
            authDomain: "youkids-project.firebaseapp.com",
            projectId: "youkids-project",
            storageBucket: "youkids-project.firebasestorage.app",
            messagingSenderId: "819621380321",
            appId: "1:819621380321:web:4e2d9958bf0f7dd4d577a0",
            measurementId: "G-7FPCRV0L55"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'egypt_radio_app';
        const stationsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'videos', 'radio_custom_stations');

        let user = null;
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenError) {
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth init error:", error);
            }
        };
        initAuth();

        window.showToast = function(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            if (!toastContainer) return;
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-600' : (type === 'success' ? 'bg-emerald-600' : 'bg-cyan-600');
            const icon = type === 'error' ? 'alert-triangle' : (type === 'success' ? 'check-circle' : 'info');
            
            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-white ${bgColor} transition-all duration-300 transform translate-y-0 opacity-100`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i><span class="font-medium text-sm leading-relaxed">${message}</span>`;
            
            toastContainer.appendChild(toast);
            lucide.createIcons({ root: toast });

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // الإذاعات الافتراضية (بدون MixPro)
        const defaultStations = [
            { id: 'x8n6dt3', title: 'إذاعة البرنامج العام', color: 'from-blue-900 to-blue-700', isCustom: false },
            { id: 'x8n6dqq', title: 'إذاعة صوت العرب', color: 'from-orange-900 to-orange-700', isCustom: false },
            { id: 'x8n6drt', title: 'إذاعة الشرق الأوسط', color: 'from-purple-900 to-purple-700', isCustom: false },
            { id: 'x8n6dzo', title: 'إذاعة الشباب والرياضة', color: 'from-green-900 to-green-700', isCustom: false },
            { id: 'x8n6dyz', title: 'إذاعة الأغاني', color: 'from-pink-900 to-pink-700', isCustom: false },
            { id: 'x8n6eci', title: 'إذاعة البرنامج الثقافي', color: 'from-teal-900 to-teal-700', isCustom: false },
            { id: 'x8n6ebs', title: 'إذاعة القاهرة الكبرى', color: 'from-indigo-900 to-indigo-700', isCustom: false },
            { id: 'x9p4ebk', title: 'إذاعة الوادي الجديد', color: 'from-amber-900 to-amber-700', isCustom: false },
            { id: 'https://audio.nrpstream.com/listen/nogoumfm/radio.mp3', title: 'نجوم FM', color: 'from-yellow-900 to-yellow-700', isCustom: false },
            { id: 'https://megafm927.radioca.st/stream', title: 'ميجا FM', color: 'from-red-900 to-red-700', isCustom: false },
            { id: 'https://eu1.fastcast4u.com/proxy/prontofm?mp=/1', title: 'برونتو FM', color: 'from-blue-900 to-blue-700', isCustom: false },
            { id: 'https://stream-176.zeno.fm/fhhhcrvxhchvv?zt=eyJhbGciOiJIUzI1NiJ9.eyJzdHJlYW0iOiJmaGhoY3J2eGhjaHZ2IiwiaG9zdCI6InN0cmVhbS0xNzYuemVuby5mbSIsInJ0dGwiOjUsImp0aSI6IjVnLXd1T00xUVNpQmUxS0FxRV9XNHciLCJpYXQiOjE3NzY4MDI1NjgsImV4cCI6MTc3NjgwMjYyOH0.a1MhZtOdclPFL67d6ojD9Q9-u8dyzvWTIa-kNACQahQ&rj-ttl=5&rj-tok=AAABfqMZ3SEAxhPnNjBT6OSbhA', title: 'إذاعة زينو', color: 'from-emerald-900 to-emerald-700', isCustom: false }
        ];

        // المتغيرات
        let customStations = [];
        let stationOverrides = {}; // لحفظ تعديلات الأسماء
        let stations = [...defaultStations];
        let currentStationId = null; 
        let isPlaying = false;
        let isAdmin = false; 
        let volume = 100;
        let isMuted = false;
        let draggedIndex = -1; // متغير السحب والإفلات
        
        // عناصر واجهة المستخدم
        const html5Audio = document.getElementById('html5-audio');
        const dmIframe = document.getElementById('dm-iframe');
        const trackTitle = document.getElementById('track-title');
        const screenContainer = document.getElementById('screen-container');
        const defaultIconContainer = document.getElementById('default-icon-container');
        const audioLogo = document.getElementById('audio-logo');
        const statusBadge = document.getElementById('status-badge');
        const trackSubtitle = document.getElementById('track-subtitle');
        const playingGlow = document.getElementById('playing-glow');
        const playlistContainer = document.getElementById('playlist-container');
        const adminModal = document.getElementById('admin-modal');
        const adminModalContent = document.getElementById('admin-modal-content');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const volumeSlider = document.getElementById('volume-slider');
        const btnMute = document.getElementById('btn-mute');
        const volumeIcon = document.getElementById('volume-icon');

        // تحديث عدد الإذاعات
        function updateStationsCount() {
            const countEl = document.getElementById('stations-count');
            if (countEl) {
                countEl.innerText = `${stations.length} إذاعة`;
            }
        }

        // الاستماع لقاعدة البيانات وتطبيق التعديلات والترتيب
        onAuthStateChanged(auth, (currentUser) => {
            user = currentUser;
            if (user) {
                onSnapshot(stationsDocRef, (docSnap) => {
                    let order = [];
                    if (docSnap.exists()) {
                        customStations = docSnap.data().stations || [];
                        stationOverrides = docSnap.data().overrides || {};
                        order = docSnap.data().order || []; // جلب الترتيب المحفوظ
                    } else {
                        customStations = [];
                        stationOverrides = {};
                    }
                    
                    // تطبيق الأسماء المعدلة على الإذاعات الافتراضية
                    const mergedDefaults = defaultStations.map(s => {
                        return { ...s, title: stationOverrides[s.id] || s.title };
                    });

                    let combined = [...mergedDefaults, ...customStations];

                    // ترتيب الإذاعات بناءً على الترتيب المحفوظ في السحابة
                    if (order.length > 0) {
                        combined.sort((a, b) => {
                            let indexA = order.indexOf(a.id);
                            let indexB = order.indexOf(b.id);
                            if (indexA === -1) indexA = 9999; // الإذاعات الجديدة توضع في النهاية
                            if (indexB === -1) indexB = 9999;
                            return indexA - indexB;
                        });
                    }

                    stations = combined;
                    window.renderPlaylist();
                    
                    document.getElementById('db-status').innerHTML = `
                        <span class="text-red-400 tracking-wider">بث مباشر</span>
                        <i data-lucide="radio-tower" class="w-4 h-4 text-red-400 animate-pulse"></i>
                        <div class="w-2 h-2 rounded-full bg-emerald-500 mr-2 shadow-[0_0_5px_#10b981]" title="متصل بالسحابة"></div>
                    `;
                    lucide.createIcons({ root: document.getElementById('db-status') });
                }, (error) => {
                    console.error("خطأ في جلب بيانات الإذاعات:", error);
                    window.showToast("خطأ في الاتصال بقاعدة البيانات. راجع الصلاحيات.", "error");
                    document.getElementById('db-status').innerHTML = `
                        <span class="text-red-400 tracking-wider">بث مباشر</span>
                        <i data-lucide="radio-tower" class="w-4 h-4 text-red-400 animate-pulse"></i>
                        <div class="w-2 h-2 rounded-full bg-red-500 mr-2 shadow-[0_0_5px_#ef4444]" title="غير متصل"></div>
                    `;
                    lucide.createIcons({ root: document.getElementById('db-status') });
                });
            } else {
                stations = [...defaultStations];
                window.renderPlaylist();
            }
        });

        // رسم القائمة
        window.renderPlaylist = function() {
            updateStationsCount();
            playlistContainer.innerHTML = stations.map((station, index) => {
                const isActive = station.id === currentStationId; 
                const activeClass = isActive ? 'border-amber-500 bg-[#2b1810]' : 'border-[#333] bg-[#1a1a1a] hover:bg-[#222]';
                const textClass = isActive ? 'text-amber-400' : 'text-gray-200';
                const iconOrEq = isActive && isPlaying 
                    ? `<div class="flex items-end justify-center gap-1 h-5 w-5">
                        <div class="w-1 bg-amber-400 animate-[bounce_1s_infinite]"></div>
                        <div class="w-1 bg-amber-400 animate-[bounce_1s_infinite_0.2s]"></div>
                        <div class="w-1 bg-amber-400 animate-[bounce_1s_infinite_0.4s]"></div>
                       </div>`
                    : `<i data-lucide="${isActive ? 'pause-circle' : 'play-circle'}" class="w-6 h-6 ${isActive ? 'text-amber-400' : 'text-gray-500'}"></i>`;

                // أزرار التعديل والحذف للإدمن
                let adminButtons = '';
                if (isAdmin) {
                    const editBtn = `<button onclick="window.editStationName(event, ${index})" class="p-2 bg-blue-900/50 hover:bg-blue-600 text-blue-300 hover:text-white rounded-lg transition-colors ml-1" title="تعديل الاسم"><i data-lucide="edit" class="w-4 h-4"></i></button>`;
                    const deleteBtn = station.isCustom ? `<button onclick="window.deleteCustomStation(event, ${index})" class="p-2 bg-red-900/50 hover:bg-red-600 text-red-300 hover:text-white rounded-lg transition-colors" title="حذف الإذاعة"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '';
                    adminButtons = `<div class="flex">${editBtn}${deleteBtn}</div>`;
                }

                // خصائص السحب والإفلات (Drag & Drop) تظهر للإدمن فقط
                const dragAttrs = isAdmin ? `draggable="true" ondragstart="window.handleDragStart(event, ${index})" ondragover="window.handleDragOver(event)" ondrop="window.handleDrop(event, ${index})" ondragenter="window.handleDragEnter(event)" ondragleave="window.handleDragLeave(event)"` : '';
                const dragHandle = isAdmin ? `<div class="cursor-grab text-gray-500 hover:text-white mr-1 ml-3 flex-shrink-0" title="اسحب للترتيب"><i data-lucide="grip-vertical" class="w-5 h-5"></i></div>` : '';

                return `
                    <div ${dragAttrs} onclick="window.selectStation(${index})" class="flex items-center gap-3 p-4 rounded-xl border ${activeClass} cursor-pointer transition-all shadow-md group">
                        ${dragHandle}
                        <div class="w-12 h-12 rounded-lg bg-gradient-to-br ${station.color} flex items-center justify-center shadow-inner shrink-0 group-hover:scale-105 transition-transform border border-black/50">
                            <i data-lucide="radio" class="w-6 h-6 text-white/80"></i>
                        </div>
                        <div class="flex-1 min-w-0 text-right">
                            <h4 class="text-lg font-bold ${textClass} truncate">${station.title}</h4>
                            <p class="text-xs text-gray-400 truncate mt-1">${station.isCustom ? 'إذاعة مضافة' : 'بث مباشر'}</p>
                        </div>
                        ${adminButtons}
                        <div class="shrink-0 flex items-center justify-center w-10">
                            ${iconOrEq}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons({ root: playlistContainer });
        }

        // إرسال أوامر لديليموشن
        function sendDMCommand(command, param) {
            if (!dmIframe.contentWindow) return;
            let msg = 'command=' + command;
            if (param !== undefined) msg += '&parameters[]=' + param;
            dmIframe.contentWindow.postMessage(msg, '*');
        }

        // تهيئة واختيار المحطة (ذكية: تختار بين ديليموشن والرابط المباشر)
        window.selectStation = function(index) {
            const station = stations[index];
            currentStationId = station.id; 
            const isDirectLink = station.id.startsWith('http');
            
            trackTitle.innerText = station.title;
            btnPlayPause.classList.remove('opacity-50', 'pointer-events-none');
            
            statusBadge.innerText = 'جاري الاتصال...';
            statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-yellow-900/40 text-yellow-400 border border-yellow-700/50';

            if (isDirectLink) {
                // تشغيل رابط صوتي مباشر عبر HTML5 Audio
                dmIframe.classList.add('hidden');
                dmIframe.src = '';
                defaultIconContainer.classList.remove('hidden');
                trackSubtitle.innerText = 'بث صوتي مباشر عبر الأثير';
                
                html5Audio.src = station.id;
                html5Audio.volume = volume / 100;
                html5Audio.muted = isMuted;
                
                const playPromise = html5Audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(e => { /* التجاهل لتجنب طباعة الأخطاء بالكونسول */ });
                }
                
                isPlaying = !html5Audio.paused;
                updatePlayerUI();
            } else {
                // تشغيل فيديو ديليموشن عبر Iframe
                html5Audio.pause();
                html5Audio.removeAttribute('src');
                defaultIconContainer.classList.add('hidden');
                dmIframe.classList.remove('hidden');
                trackSubtitle.innerText = 'التحكم متاح داخل الشاشة';

                let originParam = window.location.origin !== 'file://' && window.location.origin !== 'null' ? `&origin=${encodeURIComponent(window.location.origin)}` : '&origin=http://localhost';
                dmIframe.src = `https://www.dailymotion.com/embed/video/${station.id}?api=1${originParam}&autoplay=1&mute=0&controls=1&ui-logo=0&sharing-enable=0&ui-start-screen-info=0`;

                isPlaying = false;
                updatePlayerUI();
            }
            window.renderPlaylist();
        }

        // أحداث المشغل المباشر (HTML5 Audio)
        html5Audio.addEventListener('play', () => { 
            isPlaying = true; updatePlayerUI(); 
            statusBadge.innerText = 'بث مباشر 🔴';
            statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-red-900/40 text-red-400 border border-red-700/50';
        });
        html5Audio.addEventListener('pause', () => { 
            isPlaying = false; updatePlayerUI(); 
            statusBadge.innerText = 'متوقف';
            statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-gray-900/40 text-gray-400 border border-gray-700/50';
        });
        html5Audio.addEventListener('waiting', () => {
            statusBadge.innerText = 'جاري التحميل...';
            statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-yellow-900/40 text-yellow-400 border border-yellow-700/50';
        });

        // أحداث ديليموشن
        window.addEventListener('message', (event) => {
            if (!event.origin.includes('dailymotion.com')) return;
            let eventName = '';
            try {
                if (typeof event.data === 'string') {
                    const params = new URLSearchParams(event.data);
                    eventName = params.get('event');
                }
            } catch(e) {}

            if (!eventName) return;

            if (eventName === 'play' || eventName === 'playing') {
                isPlaying = true;
                updatePlayerUI();
                statusBadge.innerText = 'بث مباشر 🔴';
                statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-red-900/40 text-red-400 border border-red-700/50';
            } 
            else if (eventName === 'pause') {
                isPlaying = false;
                updatePlayerUI();
                statusBadge.innerText = 'متوقف';
                statusBadge.className = 'inline-block mb-2 px-2 py-0.5 rounded text-[10px] bg-gray-900/40 text-gray-400 border border-gray-700/50';
            }
        });

        function updatePlayerUI() {
            if (isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                screenContainer.classList.add('border-amber-500', 'shadow-[0_0_30px_rgba(245,158,11,0.5)]');
                screenContainer.classList.remove('border-gray-800');
                playingGlow.classList.remove('hidden');
                if (audioLogo) {
                    audioLogo.classList.add('animate-pulse-ring', 'drop-shadow-[0_0_15px_rgba(245,158,11,0.6)]');
                    audioLogo.classList.remove('grayscale', 'opacity-50');
                }
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
                screenContainer.classList.remove('border-amber-500', 'shadow-[0_0_30px_rgba(245,158,11,0.5)]');
                screenContainer.classList.add('border-gray-800');
                playingGlow.classList.add('hidden');
                if (audioLogo) {
                    audioLogo.classList.remove('animate-pulse-ring', 'drop-shadow-[0_0_15px_rgba(245,158,11,0.6)]');
                    audioLogo.classList.add('grayscale', 'opacity-50');
                }
            }
            window.renderPlaylist();
        }

        // أزرار التحكم الخارجي
        btnPlayPause.addEventListener('click', () => {
            if (!currentStationId) return;
            const station = stations.find(s => s.id === currentStationId);
            if (!station) return;
            
            const isDirectLink = station.id.startsWith('http');
            
            if (isDirectLink) {
                if (html5Audio.paused) {
                    const playPromise = html5Audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(e => { /* التجاهل لتجنب طباعة الأخطاء بالكونسول */ });
                    }
                } else {
                    html5Audio.pause();
                }
            } else {
                sendDMCommand(isPlaying ? 'pause' : 'play');
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            volume = parseInt(e.target.value);
            isMuted = volume === 0;
            updateVolumeIcon();
            
            const station = stations.find(s => s.id === currentStationId);
            if (station && station.id.startsWith('http')) {
                html5Audio.volume = volume / 100;
                html5Audio.muted = isMuted;
            } else {
                sendDMCommand('volume', volume / 100);
                sendDMCommand('muted', isMuted ? 'true' : 'false');
            }
        });

        btnMute.addEventListener('click', () => {
            isMuted = !isMuted;
            if (!isMuted && volume === 0) volume = 50; 
            volumeSlider.value = isMuted ? 0 : volume;
            updateVolumeIcon();
            
            const station = stations.find(s => s.id === currentStationId);
            if (station && station.id.startsWith('http')) {
                html5Audio.muted = isMuted;
                if (!isMuted) html5Audio.volume = volume / 100;
            } else {
                sendDMCommand('muted', isMuted ? 'true' : 'false');
                if (!isMuted) sendDMCommand('volume', volume / 100);
            }
        });

        function updateVolumeIcon() {
            let icon = 'volume-2';
            if (isMuted || volume == 0) icon = 'volume-x';
            else if (volume < 50) icon = 'volume-1';
            volumeIcon.setAttribute('data-lucide', icon);
            lucide.createIcons({ root: btnMute });
        }

        // ==========================================
        // نظام لوحة التحكم
        // ==========================================
        let headerClickCount = 0;
        let headerClickTimer;
        
        const header = document.getElementById('main-header');
        header.addEventListener('click', () => {
            headerClickCount++;
            clearTimeout(headerClickTimer);
            if (headerClickCount >= 5) {
                headerClickCount = 0;
                window.openAdminModal();
            } else {
                headerClickTimer = setTimeout(() => { headerClickCount = 0; }, 1500);
            }
        });

        window.openAdminModal = function() {
            adminModal.classList.remove('hidden');
            adminModal.classList.add('flex');
            setTimeout(() => {
                adminModal.classList.remove('opacity-0');
                adminModalContent.classList.remove('scale-95');
            }, 10);
            if (!isAdmin) renderLoginUI(); else renderDashboardUI();
        }

        window.closeAdminModal = function() {
            adminModal.classList.add('opacity-0');
            adminModalContent.classList.add('scale-95');
            setTimeout(() => {
                adminModal.classList.add('hidden');
                adminModal.classList.remove('flex');
            }, 300);
        }

        function renderLoginUI() {
            adminModalContent.innerHTML = `
                <div class="flex items-center justify-between mb-6 border-b border-[#333] pb-4">
                    <h3 class="text-xl font-bold text-[#d4af37] flex items-center gap-2">
                        <i data-lucide="lock" class="w-6 h-6"></i> لوحة التحكم
                    </h3>
                    <button onclick="window.closeAdminModal()" class="text-gray-500 hover:text-red-400 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">أدخل كلمة المرور:</label>
                        <input type="password" id="admin-password" class="w-full bg-[#0a0502] border border-[#333] rounded-xl px-4 py-3 text-white focus:border-[#d4af37] outline-none text-center tracking-widest" placeholder="••••">
                    </div>
                    <button onclick="window.checkPassword()" class="w-full py-3 bg-gradient-to-r from-[#d4af37] to-[#996515] text-black font-bold rounded-xl hover:opacity-90 transition-opacity">دخول</button>
                </div>
            `;
            lucide.createIcons({ root: adminModalContent });
            document.getElementById('admin-password').focus();
            document.getElementById('admin-password').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') window.checkPassword();
            });
        }

        window.checkPassword = function() {
            const pass = document.getElementById('admin-password').value;
            if (pass === '2112') {
                isAdmin = true;
                window.showToast('تم تسجيل الدخول بنجاح', 'success');
                renderDashboardUI();
                window.renderPlaylist(); 
            } else {
                window.showToast('كلمة المرور خاطئة!', 'error');
            }
        }

        function renderDashboardUI() {
            adminModalContent.innerHTML = `
                <div class="flex items-center justify-between mb-6 border-b border-[#333] pb-4">
                    <h3 class="text-xl font-bold text-[#d4af37] flex items-center gap-2">
                        <i data-lucide="settings" class="w-6 h-6"></i> إدارة الإذاعات
                    </h3>
                    <button onclick="window.closeAdminModal()" class="text-gray-500 hover:text-red-400 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">اسم الإذاعة:</label>
                        <input type="text" id="new-station-name" class="w-full bg-[#0a0502] border border-[#333] rounded-xl px-4 py-3 text-white focus:border-[#d4af37] outline-none" placeholder="مثال: إذاعة القرآن الكريم">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">الرابط المباشر أو المعرف:</label>
                        <input type="text" id="new-station-url" class="w-full bg-[#0a0502] border border-[#333] rounded-xl px-4 py-3 text-white focus:border-[#d4af37] outline-none text-left" dir="ltr" placeholder="https://...">
                    </div>
                    <button onclick="window.addNewStation()" class="w-full py-3 bg-gradient-to-r from-emerald-600 to-emerald-800 text-white font-bold rounded-xl hover:opacity-90 transition-opacity flex justify-center items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> إضافة الإذاعة وحفظها
                    </button>
                </div>
            `;
            lucide.createIcons({ root: adminModalContent });
        }

        function extractDMId(url) {
            let match = url.match(/video\/([a-zA-Z0-9]+)/);
            if (match) return match[1];
            match = url.match(/video=([a-zA-Z0-9]+)/);
            if (match) return match[1];
            if (url.startsWith('http')) return url.trim(); // رابط مباشر
            return url.trim(); 
        }

        window.addNewStation = async function() {
            if (!user) { window.showToast('جاري الاتصال بالسحابة...', 'info'); return; }
            const nameInput = document.getElementById('new-station-name').value.trim();
            const urlInput = document.getElementById('new-station-url').value.trim();

            if (!nameInput || !urlInput) { window.showToast('يرجى تعبئة جميع الحقول', 'error'); return; }

            const videoId = extractDMId(urlInput);
            const colors = ['from-red-900 to-red-700', 'from-blue-900 to-blue-700', 'from-emerald-900 to-emerald-700', 'from-fuchsia-900 to-fuchsia-700', 'from-rose-900 to-rose-700', 'from-cyan-900 to-cyan-700'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            const newStation = { id: videoId, title: nameInput, color: randomColor, isCustom: true };
            const updatedCustomStations = [...customStations, newStation];
            
            try {
                await setDoc(stationsDocRef, { stations: updatedCustomStations, overrides: stationOverrides }, { merge: true });
                window.showToast('تمت الإضافة بنجاح!', 'success');
                document.getElementById('new-station-name').value = '';
                document.getElementById('new-station-url').value = '';
            } catch (e) {
                window.showToast('حدث خطأ أثناء الحفظ.', 'error');
            }
        }

        // تعديل اسم الإذاعة
        window.editStationName = async function(event, index) {
            event.stopPropagation();
            if (!user) return;
            
            const station = stations[index];
            const newName = prompt(`تعديل اسم إذاعة "${station.title}":`, station.title);
            
            if (!newName || newName.trim() === '' || newName === station.title) return;

            if (station.isCustom) {
                const customIndex = customStations.findIndex(s => s.id === station.id);
                if (customIndex !== -1) {
                    customStations[customIndex].title = newName.trim();
                }
            } else {
                stationOverrides[station.id] = newName.trim();
            }

            try {
                await setDoc(stationsDocRef, { stations: customStations, overrides: stationOverrides }, { merge: true });
                window.showToast('تم تعديل الاسم بنجاح!', 'success');
            } catch (e) {
                window.showToast('حدث خطأ أثناء حفظ التعديل.', 'error');
            }
        }

        window.deleteCustomStation = async function(event, index) {
            event.stopPropagation();
            if (!user) return;
            if(!confirm('هل أنت متأكد من حذف هذه الإذاعة نهائياً؟')) return;

            const stationToDelete = stations[index];
            const customIndex = customStations.findIndex(s => s.id === stationToDelete.id);
            
            if (customIndex >= 0) {
                const updatedCustomStations = [...customStations];
                updatedCustomStations.splice(customIndex, 1);
                
                try {
                    await setDoc(stationsDocRef, { stations: updatedCustomStations, overrides: stationOverrides }, { merge: true });
                    if (currentStationId === stationToDelete.id) {
                        dmIframe.src = '';
                        html5Audio.pause();
                        html5Audio.removeAttribute('src');
                        dmIframe.classList.add('hidden');
                        defaultIconContainer.classList.remove('hidden');
                        trackTitle.innerText = 'اختر إذاعة للبدء';
                        statusBadge.innerText = 'متوقف';
                        currentStationId = null;
                        isPlaying = false;
                        updatePlayerUI();
                    }
                    window.showToast('تم الحذف بنجاح', 'info');
                } catch(e) {
                    window.showToast('حدث خطأ أثناء الحذف.', 'error');
                }
            }
        }

        // ==========================================
        // نظام السحب والإفلات (Drag & Drop)
        // ==========================================
        
        window.handleDragStart = function(e, index) {
            if (!isAdmin) return;
            draggedIndex = index;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => { e.target.classList.add('opacity-50', 'scale-95'); }, 0);
        }

        window.handleDragOver = function(e) {
            if (!isAdmin) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        window.handleDragEnter = function(e) {
            if (!isAdmin) return;
            e.preventDefault();
            const item = e.currentTarget;
            if (item.classList) item.classList.add('border-dashed', 'border-amber-400');
        }

        window.handleDragLeave = function(e) {
            if (!isAdmin) return;
            const item = e.currentTarget;
            if (item.classList) item.classList.remove('border-dashed', 'border-amber-400');
        }

        window.handleDrop = async function(e, targetIndex) {
            if (!isAdmin) return;
            e.preventDefault();
            e.currentTarget.classList.remove('border-dashed', 'border-amber-400');
            
            if (draggedIndex === -1 || draggedIndex === targetIndex) return;

            // إعادة الترتيب محلياً لتحديث الواجهة فوراً بصرياً
            const movedStation = stations.splice(draggedIndex, 1)[0];
            stations.splice(targetIndex, 0, movedStation);
            window.renderPlaylist();

            // حفظ الترتيب الجديد في قاعدة البيانات عبر قائمة الـ IDs
            const newOrder = stations.map(s => s.id);
            try {
                await setDoc(stationsDocRef, { order: newOrder }, { merge: true });
                window.showToast('تم حفظ الترتيب بنجاح', 'success');
            } catch(err) {
                console.error(err);
                window.showToast('حدث خطأ أثناء حفظ الترتيب', 'error');
            }
            draggedIndex = -1;
        }

        document.addEventListener('dragend', (e) => {
            if (e.target.classList) {
                e.target.classList.remove('opacity-50', 'scale-95');
            }
            draggedIndex = -1;
        });

        // محاكي الذبذبات الوهمي
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        
        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = 6, barSpacing = 3;
            const numBars = canvas.width / (barWidth + barSpacing);
            
            for (let i = 0; i < numBars; i++) {
                let barHeight = 2; 
                if (isPlaying) {
                    barHeight = Math.random() * (canvas.height - 10) + 10;
                    const gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
                    gradient.addColorStop(0, '#d4af37'); gradient.addColorStop(0.5, '#f59e0b'); gradient.addColorStop(1, '#ef4444'); 
                    ctx.fillStyle = gradient;
                } else {
                    ctx.fillStyle = '#4a3018'; 
                }
                ctx.fillRect(i * (barWidth + barSpacing), canvas.height - barHeight, barWidth, barHeight);
            }
        }

        drawVisualizer();

    </script>
</body>
</html>
