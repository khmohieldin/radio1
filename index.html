    <style>
        /* Modern CSS Variables & Theming (Glassmorphism) */
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --blood: #e11d48;
            --blood-hover: #be123c;

            /* Dark Theme (Default) */
            --bg-base: #0f172a;
            --bg-surface: rgba(30, 41, 59, 0.7);
            --bg-surface-solid: #1e293b;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        body.theme-light {
            --bg-base: #f8fafc;
            --bg-surface: rgba(255, 255, 255, 0.8);
            --bg-surface-solid: #ffffff;
            --border-color: rgba(0, 0, 0, 0.15);
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        body.theme-blue {
            --bg-base: #0c4a6e;
            --bg-surface: rgba(8, 47, 73, 0.7);
            --bg-surface-solid: #082f49;
            --border-color: rgba(255, 255, 255, 0.15);
            --text-main: #f0f9ff;
            --text-muted: #bae6fd;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            font-size: 1rem;
            font-weight: 700;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-weight: 900;
        }

        button,
        .nav-btn,
        a {
            font-weight: 800;
        }

        .glass-panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
        }

        .solid-panel {
            background: var(--bg-surface-solid);
            border: 1px solid var(--border-color);
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-hover);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes scrollMarquee {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .animate-marquee {
            display: inline-block;
            animation: scrollMarquee 25s linear infinite;
            white-space: nowrap;
        }

        @keyframes scrollUpVertical {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-50%);
            }
        }

        .animate-scroll-up {
            display: flex;
            flex-direction: column;
            animation: scrollUpVertical linear infinite;
        }

        .portal-section-container:hover .animate-scroll-up {
            animation-play-state: paused;
        }

        /* Album Slideshow Animations */
        .album-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 0;
        }

        .album-slide.active {
            opacity: 1;
            z-index: 10;
        }

        /* Blood Drops Background */
        .blood-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .blood-bg.active {
            opacity: 1;
        }

        .drop {
            position: absolute;
            width: 15px;
            height: 22px;
            background-color: rgba(220, 38, 38, 0.3);
            border-radius: 50% 50% 50% 0;
            transform: rotate(45deg);
            animation: drip linear infinite;
            filter: blur(2px);
        }

        @keyframes drip {
            from {
                top: -30px;
            }

            to {
                top: 100vh;
            }
        }

        /* Input & Select styling */
        input,
        select,
        textarea {
            background-color: rgba(0, 0, 0, 0.2) !important;
            border: 2px solid var(--border-color) !important;
            color: var(--text-main) !important;
            font-weight: 700;
            font-size: 1rem;
        }

        body.theme-light input,
        body.theme-light select,
        body.theme-light textarea {
            background-color: rgba(255, 255, 255, 0.7) !important;
        }

        option {
            background-color: var(--bg-surface-solid) !important;
            color: var(--text-main) !important;
            font-weight: 800;
        }
    </style>

                    zakat: "زكاة المال",
                    feeding: "الإطعام",
                    oath_expiation: "كفارة يمين",
                    marriage_aid: "مساعدات زواج"
                };
                this.serviceCats = {
                    clinics: 'عيادات طبية',
                    pharmacies: 'صيدليات',
                    labs: 'معامل تحاليل',
                    wasalny: 'وصّلني (مواصلات)',
                    other: 'خدمات عامة أخرى'
                };

                this.auth = new AuthMod(this);
                this.pub = new PublicMod(this);
                this.blood = new BloodMod(this);
                this.admin = new AdminMod(this);
                this.services = new ServicesMod(this);

                window.onload = () => {
                    lucide.createIcons();
                    this.setupClock();
                    this.pub.initBloodDrops();
                    let t = localStorage.getItem('theme') || 'default';
                    document.body.className = `theme-${t} antialiased min-h-screen flex flex-col`;
                };
            }

            safeSnapshot(ref, callback) {
                return onSnapshot(ref, callback, err => {});
            }
            clear() {
                this.unsubs.forEach(u => u());
                this.unsubs = [];
                this.intervals.forEach(clearInterval);
                this.intervals = [];
            }

            navigate(v) {
                if (v === 'admin' && this.role === 'guest') return document.getElementById('login-modal').classList.remove('hidden');
                this.view = v;
                const c = document.getElementById('app-content');
                const t = document.getElementById(`view-${v}`);
                if (c && t) {
                    c.innerHTML = '';
                    c.appendChild(t.content.cloneNode(true));
                    lucide.createIcons();
                }
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-emerald-500', 'bg-rose-500', 'bg-cyan-500', 'bg-amber-500', 'text-white'));
                const a = document.querySelector(`.nav-btn[data-target="${v}"]`);
                if (a) {
                    let colorClass = 'bg-emerald-500';
                    if (v === 'bloodbank') colorClass = 'bg-rose-500';
                    else if (v === 'download') colorClass = 'bg-cyan-500';
                    else if (v === 'services') colorClass = 'bg-amber-500';
                    a.classList.add(colorClass, 'text-white');
                }
                document.getElementById('blood-fx').classList.toggle('active', v === 'bloodbank');
                this.clear();
                if (v === 'home') this.pub.initHome();
                else if (v === 'events') this.pub.initEvents();
                else if (v === 'bloodbank') this.blood.initPub();
                else if (v === 'admin') this.admin.init();
                else if (v === 'services') this.services.initPub();
            }

            cycleTheme() {
                const ts = ['default', 'light', 'blue'];
                let c = localStorage.getItem('theme') || 'default';
                let n = ts[(ts.indexOf(c) + 1) % ts.length];
                document.body.className = `theme-${n} antialiased min-h-screen flex flex-col`;
                localStorage.setItem('theme', n);
            }
            toggleRadio() {
                const a = document.getElementById('quran-audio'),
                    i = document.getElementById('icon-radio'),
                    b = document.getElementById('btn-radio');
                if (a.paused) {
                    a.play();
                    i.setAttribute('data-lucide', 'pause');
                    b.classList.add('animate-pulse');
                } else {
                    a.pause();
                    i.setAttribute('data-lucide', 'radio');
                    b.classList.remove('animate-pulse');
                }
                lucide.createIcons();
            }
            setupClock() {
                setInterval(() => {
                    const n = new Date();
                    document.getElementById('widget-time').textContent = n.toLocaleTimeString('ar-EG', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    document.getElementById('widget-date').textContent = n.toLocaleDateString('ar-EG', {
                        month: 'short',
                        day: 'numeric'
                    });
                }, 1000);
            }

            showImage(src) {
                const lb = document.getElementById('image-lightbox');
                const img = document.getElementById('lightbox-img');
                img.src = src;
                lb.classList.remove('hidden');
                setTimeout(() => {
                    lb.classList.remove('opacity-0');
                    img.classList.remove('scale-95');
                    img.classList.add('scale-100');
                }, 10);
            }
            closeImage() {
                const lb = document.getElementById('image-lightbox');
                const img = document.getElementById('lightbox-img');
                lb.classList.add('opacity-0');
                img.classList.remove('scale-100');
                img.classList.add('scale-95');
                setTimeout(() => {
                    lb.classList.add('hidden');
                }, 300);
            }
        }

        // --- 4. AUTH ---
        class AuthMod {
            constructor(a) {
                this.a = a;
                signInAnonymously(auth).catch(e => {});
                signInAnonymously(bAuth).catch(e => {});
                onAuthStateChanged(auth, async u => {
                    this.a.user = u;
                    if (u && !u.isAnonymous) {
                        if (u.email === SUPER_ADMIN) {
                            this.a.role = 'admin';
                        } else {
                            try {
                                const r = await getDoc(doc(db, "app_data", "roles"));
                                const data = r.exists() ? r.data() : {};
                                const admins = data.admins || [];
                                const viewers = data.viewers || [];
                                if (admins.includes(u.email)) {
                                    this.a.role = 'admin';
                                } else if (viewers.includes(u.email)) {
                                    this.a.role = 'viewer';
                                } else {
                                    this.a.role = 'guest';
                                }
                            } catch (e) {
                                this.a.role = 'guest';
                            }
                        }
                    } else {
                        this.a.role = 'guest';
                    }
                    this.updateUI();
                    this.a.navigate(this.a.view || 'home');
                });
            }
            updateUI() {
                const i = this.a.role === 'admin' || this.a.role === 'viewer';
                const l = document.getElementById('admin-login-btn');
                if (l) l.querySelector('i,svg').style.color = i ? '#10b981' : 'var(--text-muted)';
                document.getElementById('fab-chat').classList.toggle('hidden', this.a.role !== 'admin');
                let s = document.getElementById('role-style');
                if (!s) {
                    s = document.createElement('style');
                    s.id = 'role-style';
                    document.head.appendChild(s);
                }
                s.innerHTML = this.a.role === 'viewer' ? '.admin-only{display:none!important;}' : '';
            }
            async login(e) {
                e.preventDefault();
                const b = document.getElementById('log-btn');
                b.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-5 h-5 inline"></i> جاري...';
                lucide.createIcons();
                const em = document.getElementById('log-em').value;
                const pw = document.getElementById('log-pw').value;
                try {
                    await signInWithEmailAndPassword(auth, em, pw);
                    try {
                        await signInWithEmailAndPassword(bAuth, em, pw);
                    } catch (err) {}
                    document.getElementById('login-modal').classList.add('hidden');
                    toast('تم الدخول كمسؤول', 'success');
                    this.a.navigate('admin');
                } catch (e) {
                    console.error(e);
                    toast(e.message.includes('permission') ? 'خطأ صلاحيات (Firebase Rules)' : 'خطأ: بيانات خاطئة', 'error');
                } finally {
                    b.textContent = 'تسجيل الدخول';
                }
            }
            async logout() {
                await signOut(auth);
                try {
                    await signOut(bAuth);
                } catch (e) {}
                toast('تم تسجيل الخروج', 'info');
                this.a.navigate('home');
            }
        }

                });
                lucide.createIcons();
                document.getElementById('contact-form').onsubmit = async e => {

                let st = document.getElementById('fade-mask-style');

                    document.head.appendChild(st);
                }

            runAlbumSlideshow(c, items) {
                c.innerHTML = '';
                if (!items.length) {
                    c.innerHTML = '<div class="flex items-center justify-center h-full"><p class="text-custom-dark font-bold text-sm">لم يتم إضافة صور.</p></div>';
                    return;
                }
                items.forEach((item, i) => {
                    const slide = document.createElement('div');
                    slide.className = `album-slide w-full h-full ${i===0 ? 'active' : ''}`;
                    // استخدام الاحتواء والخلفية الضبابية لعدم قص الصورة
                    slide.innerHTML = `
                        <div class="absolute inset-0 bg-cover bg-center blur-xl opacity-40 scale-110" style="background-image: url('${item.imageUrl}')"></div>

                });

                    let idx = 0;
                    const slides = c.querySelectorAll('.album-slide');
                    this.a.intervals.push(setInterval(() => {
                        slides[idx].classList.remove('active');
                        idx = (idx + 1) % slides.length;
                        slides[idx].classList.add('active');
                    }, 10000));
                }

            runScroll(c, ts) {

                    c.innerHTML = '<div class="text-center font-bold text-xs text-[var(--text-muted)] mt-8">لا توجد مواضيع.</div>';

                    border: 'border-emerald-500/40',

                    title: 'text-purple-400'

                const itemsToRender = [...ts, ...ts];

                    scrollWrapper.appendChild(div);
                });
                c.appendChild(scrollWrapper);

            initEvents() {
                this.a.unsubs.push(this.a.safeSnapshot(query(collection(db, 'events'), orderBy('createdAt', 'desc')), s => {
                    const g = document.getElementById('events-grid');

                        const dt = d.data();
                        const c = document.createElement('div');
                        c.className = 'glass-panel rounded-3xl overflow-hidden group border border-[var(--border-color)] shadow-lg hover:shadow-[0_20px_50px_rgba(16,185,129,0.2)] transition-shadow flex flex-col h-[450px]';
                        c.innerHTML = `
                            <div class="relative overflow-hidden cursor-pointer shrink-0 h-56 w-full group" onclick="app.showImage('${dt.imageUrl||'https://placehold.co/400x250/10b981/fff?text=Event'}'); event.preventDefault();">

                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent pointer-events-none"></div>
                                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/60 p-3 rounded-full text-white backdrop-blur-md opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="zoom-in" class="w-6 h-6"></i></div>

                                    <p class="text-sm font-bold text-[var(--text-muted)] leading-relaxed whitespace-pre-wrap">${dt.description||'لا يوجد تفاصيل إضافية.'}</p>

            loadCategoryLogs() {
                if (this.uc) this.uc();
                this.uc = this.a.safeSnapshot(query(collection(db, `financials/categorized_donations/categories/${document.getElementById('sel-cat').value}/logs`), orderBy('timestamp', 'desc'), limit(15)), s => {

                });
                this.a.unsubs.push(this.uc);
            }
            loadProject() {
                const id = document.getElementById('sel-proj').value;
                if (!id) return;
                if (this.up1) this.up1();
                if (this.up2) this.up2();
                this.up1 = this.a.safeSnapshot(doc(db, `financials/temporary_projects/projects/${id}`), d => {
                    document.getElementById('bal-proj').textContent = formatEGP(d.data()?.balance);
                });
                this.up2 = this.a.safeSnapshot(query(collection(db, `financials/temporary_projects/projects/${id}/logs`), orderBy('timestamp', 'desc')), s => {
                    const nm = document.getElementById('sel-proj').options[document.getElementById('sel-proj').selectedIndex].text;
                    this.renL(document.getElementById('log-proj'), s.docs, `financials/temporary_projects/projects/${id}`, nm);

                    let tc = 0;
                    s.docs.forEach(d => {
                        const msg = d.data().message || '';
                        if (msg.includes('إضافة')) {
                            const colonIndex = msg.indexOf(':');
                            const bracketIndex = msg.indexOf('(');
                            if (colonIndex !== -1) {
                                const end = bracketIndex !== -1 ? bracketIndex : msg.length;
                                const valStr = msg.substring(colonIndex + 1, end).trim();
                                tc += pNum(valStr);
                            }
                        }
                    });
                    document.getElementById('bal-proj-total').textContent = formatEGP(tc);
                });
                this.a.unsubs.push(this.up1, this.up2);
            }

            renL(c, ds, parentPath, parentName) {
                c.innerHTML = '';
                if (!ds.length) {
                    c.innerHTML = '<div class="text-center font-bold text-[var(--text-muted)] py-3 text-sm">لا توجد سجلات.</div>';
                    return;
                }
                ds.forEach(d => {
                    const m = d.data();
                    const raw = m.message || '';
                    const match = raw.match(/(إضافة|خصم):\s*([0-9.,٠-٩]+)\s*\((.*)\)/);
                    let type = 'إضافة',
                        amt = 0,

            async transact(e, trg) {
                e.preventDefault();
                const f = e.target;
                const desc = f.elements[0].value,
                    amt = parseFloat(f.elements[1].value),
                    op = f.dataset.op;
                if (!desc || !amt) return;
                let ref, nm;
                if (trg === 'general') {
                    ref = doc(db, 'financials', 'general_expenses');
                    nm = 'الخزينة العامة';
                } else if (trg === 'category') {
                    const id = document.getElementById('sel-cat').value;
                    ref = doc(db, `financials/categorized_donations/categories/${id}`);
                    nm = this.a.donCats[id];
                } else {
                    const id = document.getElementById('sel-proj').value;
                    ref = doc(db, `financials/temporary_projects/projects/${id}`);
                    nm = document.getElementById('sel-proj').options[document.getElementById('sel-proj').selectedIndex].text;
                }
                try {
                    const sn = await getDoc(ref);
                    if (op === 'sub' && amt > (sn.data()?.balance || 0)) return toast('الرصيد المتوفر غير كافٍ لإتمام الخصم!', 'error');
                    const bt = writeBatch(db);
                    let ex = {};
                    if (trg === 'category') ex.name = nm;
                    bt.set(ref, {
                        balance: increment(op === 'add' ? amt : -amt),
                        ...ex
                    }, {
                        merge: true
                    });
                    bt.set(doc(collection(ref, 'logs')), {
                        message: `${op==='add'?'إضافة':'خصم'}: ${amt} (${desc})`,
                        timestamp: serverTimestamp()
                    });
                    await bt.commit();
                    toast('تم تسجيل العملية', 'success');
                    f.reset();
                } catch (err) {
                    console.error(err);
                    toast(err.message.includes('permission') ? 'مرفوض: تأكد من قواعد حماية Firebase' : 'خطأ: ' + err.message, 'error');
                }
            }

            // --- Reports ---
            async loadReports() {
                const tb = document.getElementById('rep-table');
                tb.innerHTML = '<tr><td colspan="5" class="text-center p-8 font-black text-lg text-emerald-500"><i data-lucide="loader-2" class="animate-spin w-6 h-6 inline mr-2"></i> جاري استدعاء السجلات...</td></tr>';
                lucide.createIcons();
                this.allTxs = [];
                const pL = (d, st, sn, p) => {
                    const m = d.message || '';
                    let ty = '-',
                        am = 0,
                        ds = m;
                    const rx = m.match(/(إضافة|خصم):\s*([0-9.,٠-٩]+)\s*\((.*)\)/);
                    if (rx) {
                        ty = rx[1] === 'إضافة' ? 'إيداع' : 'صرف';
                        am = pNum(rx[2]);
                        ds = rx[3];
                    } else {
                        am = pNum(m);
                        if (m.includes('إضافة')) ty = 'إيداع';
                        if (m.includes('خصم')) ty = 'صرف';
                    }
                    return {
                        id: d.id,
                        dt: d.timestamp?.toDate(),
                        ts: d.timestamp?.seconds || 0,
                        am,
                        ty,
                        ds,
                        st,
                        sn,
                        rm: m,
                        fp: p,
                        prnt: p.substring(0, p.lastIndexOf('/logs'))
                    };
                };
                try {
                    const g = await getDocs(query(collection(db, 'financials/general_expenses/logs')));
                    g.forEach(d => this.allTxs.push(pL({
                        ...d.data(),
                        id: d.id
                    }, 'عامة', 'الخزينة', `financials/general_expenses/logs/${d.id}`)));
                    const c = await getDocs(collection(db, 'financials/categorized_donations/categories'));
                    await Promise.all(c.docs.map(async x => {
                        const l = await getDocs(collection(db, `financials/categorized_donations/categories/${x.id}/logs`));
                        l.forEach(d => this.allTxs.push(pL({
                            ...d.data(),
                            id: d.id
                        }, 'بند', x.data().name, `financials/categorized_donations/categories/${x.id}/logs/${d.id}`)));
                    }));
                    const p = await getDocs(collection(db, 'financials/temporary_projects/projects'));
                    await Promise.all(p.docs.map(async x => {
                        const l = await getDocs(collection(db, `financials/temporary_projects/projects/${x.id}/logs`));
                        l.forEach(d => this.allTxs.push(pL({
                            ...d.data(),
                            id: d.id
                        }, 'مشروع', x.data().name, `financials/temporary_projects/projects/${x.id}/logs/${d.id}`)));
                    }));
                    this.allTxs.sort((a, b) => b.ts - a.ts);
                    this.filterReports();
                } catch (e) {
                    // Graceful fallback instead of aggressive error
                    console.error("لا يمكن الوصول لقاعدة بيانات السجلات بالكامل (قد تكون جديدة).");
                    tb.innerHTML = '<tr><td colspan="5" class="text-center text-[var(--text-muted)] font-black p-8 text-lg">لم يتم العثور على سجلات سابقة.</td></tr>';
                }
            }

                    <h1>جمعية وبنك دم شبراسندى</h1>
                    <h2>السجل المالي الشامل للإيرادات والمصروفات</h2>
                    <p>تاريخ استخراج التقرير: ${new Date().toLocaleString('ar-EG')}</p>
                </div>
                
                <div class="summary">
                    <div class="box box-in">
                        <h3>إجمالي الوارد (إيداع)</h3>
                        <p>${totalIn.toLocaleString('ar-EG')} ج.م</p>
                    </div>
                    <div class="box box-out">
                        <h3>إجمالي الصادر (خصم)</h3>
                        <p>${totalOut.toLocaleString('ar-EG')} ج.م</p>
                    </div>
                </div>
            `;

            const grouped = {};
            this.allTxs.forEach(tx => {
                const key = `${tx.st} - ${tx.sn}`;
                if(!grouped[key]) grouped[key] = [];
                grouped[key].push(tx);
            });

            for(const [groupName, txs] of Object.entries(grouped)) {
                let gIn = 0, gOut = 0;
                txs.forEach(x => { if(x.ty==='إيداع') gIn+=x.am; else if(x.ty==='صرف') gOut+=x.am; });
                
                html += `
                    <div class="group">
                        <div class="group-title">
                            <h3>${groupName}</h3>
                            <span>وارد: <span class="text-in">${gIn.toLocaleString('ar-EG')} ج.م</span> | منصرف: <span class="text-out">${gOut.toLocaleString('ar-EG')} ج.م</span></span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 20%;">التاريخ والوقت</th>
                                    <th style="width: 10%;">النوع</th>
                                    <th style="width: 15%;">المبلغ</th>
                                    <th style="width: 55%;">بيان المعاملة</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                txs.forEach(tx => {
                    const typeClass = tx.ty === 'إيداع' ? 'text-in' : 'text-out';
                    html += `
                        <tr>
                            <td dir="ltr" style="text-align: right;">${tx.dt?.toLocaleString('ar-EG')||'-'}</td>
                            <td class="${typeClass}">${tx.ty}</td>
                            <td class="${typeClass}">${tx.am.toLocaleString('ar-EG')}</td>
                            <td>${tx.ds}</td>
                        </tr>
                    `;
                });
                
                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            }

            html += `
                <div style="text-align: center; margin-top: 40px; color: #94a3b8; font-size: 12px; font-weight: bold;">
                    تم استخراج هذا التقرير آلياً من النظام المالي الإلكتروني.
                </div>
            </body></html>`;

            const printWindow = window.open('', '_blank');
            if (printWindow) {
                printWindow.document.open();

        editFullTx(logPath, parentPath, oldType, oldAmt, oldDesc) {
            document.getElementById('edit-tx-path').value = logPath; document.getElementById('edit-tx-parent-path').value = parentPath; document.getElementById('edit-tx-old-type').value = oldType; document.getElementById('edit-tx-old-amt').value = oldAmt;

            async saveEditTx() {
                const logPath = document.getElementById('edit-tx-path').value;
                const parentPath = document.getElementById('edit-tx-parent-path').value;
                const oldType = document.getElementById('edit-tx-old-type').value;
                const oldAmt = parseFloat(document.getElementById('edit-tx-old-amt').value) || 0;
                const newType = document.getElementById('edit-tx-type').value;
                const newAmt = parseFloat(document.getElementById('edit-tx-amt').value) || 0;
                const newDesc = document.getElementById('edit-tx-desc').value.trim();
                if (!newDesc || !newAmt) return toast('يجب إدخال المبلغ والبيان', 'error');
                const oldEffect = oldType === 'إضافة' ? oldAmt : -oldAmt;
                const newEffect = newType === 'إضافة' ? newAmt : -newAmt;
                const balanceDiff = newEffect - oldEffect;
                try {
                    const batch = writeBatch(db);
                    const newLogMessage = `${newType}: ${newAmt} (${newDesc})`;
                    batch.update(doc(db, logPath), {
                        message: newLogMessage
                    });
                    if (parentPath && parentPath !== 'undefined') {
                        const parentRef = doc(db, parentPath);
                        let updateObj = {
                            balance: increment(balanceDiff)
                        };
                        batch.update(parentRef, updateObj);
                    }
                    await batch.commit();
                    document.getElementById('edit-tx-modal').classList.add('hidden');
                    toast('تم تحديث بيانات المعاملة وضبط الرصيد آلياً بتميز!', 'success');
                    const tb = document.getElementById('rep-table');
                    if (tb && tb.offsetParent !== null) this.loadReports();
                } catch (e) {
                    toast('تعذر الحفظ والتحديث!', 'error');
                }
            }

                const em = document.getElementById('usr-email').value.trim();
                const pw = document.getElementById('usr-pw').value;
                const rl = document.getElementById('usr-role').value;
                try {
                    const tmp = initializeApp(charityConfig, "TempApp_" + Date.now());
                    const tA = getAuth(tmp);
                    try {
                        await createUserWithEmailAndPassword(tA, em, pw);
                    } catch (er) {
                        if (er.code !== 'auth/email-already-in-use') throw er;
                    } finally {
                        await deleteApp(tmp).catch(e => {});
                    }
                    const rD = doc(db, 'app_data', 'roles');
                    if (rl === 'admin') await updateDoc(rD, {
                        admins: arrayUnion(em),
                        viewers: arrayRemove(em)
                    });
                    else await updateDoc(rD, {
                        viewers: arrayUnion(em),
                        admins: arrayRemove(em)
                    });
                    e.target.reset();
                    toast('تم إضافة الصلاحيات', 'success');
                } catch (err) {
                    console.error(err);
                    toast(err.message.includes('permission') ? 'مرفوض: تأكد من قواعد حماية Firebase' : 'خطأ: ' + err.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'إضافة المشرف للمنصة';
                }
            }
            async removeUser(email, roleType) {
                confirm('سحب الصلاحية؟', async () => {
                    const rD = doc(db, 'app_data', 'roles');
                    if (roleType === 'admin') await updateDoc(rD, {
                        admins: arrayRemove(email)
                    });
                    else await updateDoc(rD, {
                        viewers: arrayRemove(email)
                    });
                    toast('تم الإلغاء', 'success');
                });
            }

            // --- Blood Bank Admin ---
            initBb() {
                this.a.unsubs.push(this.a.safeSnapshot(doc(bDb, `${BB_PATH}/config/marquee`), d => {
                    document.getElementById('bb-marq-inp').value = d.data()?.text || '';
                }));
                this.a.unsubs.push(this.a.safeSnapshot(query(collection(bDb, `${BB_PATH}/pendingDonors`)), s => {
                    const l = document.getElementById('bb-pend-list');
                    l.innerHTML = '';
                    s.forEach(d => {
                        const v = d.data();
                        l.innerHTML += `<div class="bg-[var(--bg-base)] p-5 rounded-2xl border border-[var(--border-color)] shadow-md"><h4 class="font-black text-lg text-white mb-2">${v.name} <span class="text-rose-500 text-base ml-2 border border-rose-500/50 rounded-lg px-2 py-1 shadow-inner">${v.bloodType}</span></h4><p class="text-sm font-bold mt-2 font-mono text-blue-300 bg-blue-900/30 p-2 rounded-lg inline-block" dir="ltr"><i data-lucide="phone-call" class="inline w-4 h-4 mr-1"></i>${v.phone}</p><div class="flex gap-2 mt-5 admin-only"><button onclick="app.admin.apprBb('${d.id}')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-2 rounded-xl shadow-sm border border-emerald-400">اعتماد ✔️</button><button onclick="app.admin.rejBb('${d.id}')" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white text-sm font-bold py-2 rounded-xl shadow-sm border border-rose-400">رفض ✖️</button></div></div>`;
                    });
                    lucide.createIcons();
                }));
                this.a.unsubs.push(this.a.safeSnapshot(query(collection(bDb, `${BB_PATH}/donors`)), s => {
                    const l = document.getElementById('bb-all-list');
                    l.innerHTML = '';
                    s.forEach(d => {
                        const v = d.data();
                        const a = v.availability === 'available';
                        l.innerHTML += `<tr><td class="p-4 font-black text-base text-white">${v.name}</td><td class="p-4 font-black text-rose-500 text-center text-xl drop-shadow-sm">${v.bloodType}</td><td class="p-4 font-bold font-mono text-sm text-blue-300" dir="ltr">${v.phone}</td><td class="p-4 text-center"><span class="text-xs font-bold px-3 py-1.5 rounded-full border ${a?'bg-emerald-500/20 text-emerald-400 border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.3)]':'bg-amber-500/20 text-amber-400 border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.3)]'}"><i data-lucide="${a?'check-circle':'plane'}" class="w-4 h-4 inline mr-1"></i> ${a?'متاح':'مسافر'}</span></td><td class="p-4 admin-only text-center"><button onclick="app.admin.openEditBb('${d.id}','${v.name.replace(/'/g,"\\'")}','${v.age||''}','${v.bloodType}','${v.phone}','${v.availability}')" class="text-cyan-400 bg-[var(--bg-surface-solid)] px-3 py-2 rounded-xl hover:bg-cyan-600 hover:text-white ml-2 transition-colors border border-[var(--border-color)] shadow-sm font-bold text-sm" title="تعديل"><i data-lucide="edit-3" class="w-4 h-4 inline ml-1"></i> تعديل</button><button onclick="app.admin.delBb('${d.id}')" class="text-rose-500 bg-[var(--bg-surface-solid)] px-3 py-2 rounded-xl hover:bg-rose-600 hover:text-white transition-colors border border-[var(--border-color)] shadow-sm font-bold text-sm" title="إزالة"><i data-lucide="trash-2" class="w-4 h-4 inline ml-1"></i> حذف</button></td></tr>`;
                    });
                    lucide.createIcons();
                }));
            }
            async saveBbMarquee(e) {
                e.preventDefault();
                try {
                    await setDoc(doc(bDb, `${BB_PATH}/config/marquee`), {
                        text: document.getElementById('bb-marq-inp').value
                    });
                    toast('تم التحديث', 'success');
                } catch (er) {
                    console.error(er);
                    toast(er.message.includes('permission') ? 'مرفوض: تأكد من قواعد حماية Firebase' : 'خطأ: ' + er.message, 'error');
                }
            }
            async addBbManual(e) {
                e.preventDefault();
                const f = e.target;
                try {
                    await addDoc(collection(bDb, `${BB_PATH}/donors`), {
                        name: document.getElementById('bb-m-name').value,
                        age: document.getElementById('bb-age')?.value || '',
                        bloodType: document.getElementById('bb-m-blood').value,
                        phone: document.getElementById('bb-m-phone').value,
                        lastDonationDate: document.getElementById('bb-last')?.value || '',
                        availability: document.getElementById('bb-m-avail')?.value || 'available',
                        createdAt: serverTimestamp()
                    });
                    f.reset();
                    toast('تم تسجيل المتبرع', 'success');
                } catch (er) {
                    console.error(er);
                    toast(er.message.includes('permission') ? 'مرفوض: تأكد من قواعد حماية Firebase' : 'خطأ: ' + er.message, 'error');
                }
            }
            async apprBb(id) {
                const r = doc(bDb, `${BB_PATH}/pendingDonors`, id);
                const s = await getDoc(r);
                if (s.exists()) {
                    await addDoc(collection(bDb, `${BB_PATH}/donors`), {
                        ...s.data(),
                        createdAt: serverTimestamp()
                    });
                    await deleteDoc(r);
                    toast('تم قبول الطلب', 'success');
                }
            }
            async rejBb(id) {
                confirm('رفض؟', async () => await deleteDoc(doc(bDb, `${BB_PATH}/pendingDonors`, id)));
            }
            async delBb(id) {
                confirm('حذف؟', async () => await deleteDoc(doc(bDb, `${BB_PATH}/donors`, id)));
            }
            openEditBb(id, name, age, blood, phone, avail) {
                document.getElementById('edit-bb-id').value = id;
                document.getElementById('edit-bb-name').value = name;
                document.getElementById('edit-bb-age').value = age;
                document.getElementById('edit-bb-blood').value = blood;
                document.getElementById('edit-bb-phone').value = phone;
                document.getElementById('edit-bb-avail').value = avail;
                document.getElementById('edit-bb-modal').classList.remove('hidden');
            }
            async saveEditBb() {
                const id = document.getElementById('edit-bb-id').value;
                const name = document.getElementById('edit-bb-name').value;
                const age = document.getElementById('edit-bb-age').value;
                const blood = document.getElementById('edit-bb-blood').value;
                const phone = document.getElementById('edit-bb-phone').value;
                const avail = document.getElementById('edit-bb-avail').value;
                if (!name || !blood || !phone) return toast('بيانات ناقصة', 'error');
                try {
                    await updateDoc(doc(bDb, `${BB_PATH}/donors`, id), {
                        name,
                        age,
                        bloodType: blood,
                        phone,
                        availability: avail
                    });
                    document.getElementById('edit-bb-modal').classList.add('hidden');
                    toast('تم التحديث', 'success');
                } catch (e) {
                    console.error(e);
                    toast(e.message.includes('permission') ? 'مرفوض: تأكد من قواعد حماية Firebase' : 'خطأ: ' + e.message, 'error');
                }
            }

            // --- Internal Chat ---
            loadChat() {
                this.a.unsubs.push(this.a.safeSnapshot(query(collection(db, 'internal_chat'), orderBy('timestamp')), s => {
                    const c = document.getElementById('chat-msgs');
                    c.innerHTML = '';
                    s.forEach(d => {
                        const m = d.data();
                        const u = this.a.user && this.a.user.email === m.senderEmail;
                        c.innerHTML += `<div class="flex ${u?'justify-end':'justify-start'}"><div class="max-w-[85%] p-4 rounded-2xl shadow-md ${u?'bg-emerald-600 text-white rounded-br-none':'bg-[var(--bg-surface-solid)] rounded-bl-none border border-[var(--border-color)]'}"><p class="text-xs font-black opacity-80 mb-2">${m.senderEmail}</p><p class="text-base font-bold leading-relaxed">${m.text}</p>${this.a.role==='admin'?`<div class="text-left mt-2 pt-2 border-t ${u?'border-emerald-500/50':'border-[var(--border-color)]'}"><button onclick="app.deleteDoc(doc(db,'internal_chat','${d.id}'))" class="text-rose-300 opacity-80 hover:opacity-100 p-1.5 bg-black/20 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`:''}</div></div>`;
                    });
                    lucide.createIcons();
                    c.scrollTop = c.scrollHeight;
                }));
            }
            async sendChat(e) {
                e.preventDefault();
                const i = document.getElementById('chat-inp');
                if (i.value.trim() && this.a.user) await addDoc(collection(db, 'internal_chat'), {
                    text: i.value.trim(),
                    senderEmail: this.a.user.email,
                    timestamp: serverTimestamp()
                });
                i.value = '';
            }
        }

        // --- INIT ---
        window.app = new App();
        window.app.updateDoc = updateDoc;
        window.app.deleteDoc = deleteDoc;
        window.doc = doc;
        window.db = db;
    </script>
</body>

</html>
