    <!-- Custom Cosmic & Neon Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050814;
            color: white;
            overflow-x: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }
        
        input, textarea, select {
            user-select: text;
            -webkit-user-select: text;
            /* منع الزوم التلقائي في الآيفون */
            font-size: 16px !important; 
        }
        
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #050814; } 
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        
        /* إخفاء شريط التمرير الأفقي للهواتف */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .stars-bg { 
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0)); 
            background-repeat: repeat; 
            background-size: 200px 200px; 
            opacity: 0.3; 
        }
        
        @keyframes neon-glow-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(59,130,246, 0.4), inset 0 0 10px rgba(59,130,246, 0.2); border-color: rgba(59,130,246, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(168,85,247, 0.8), inset 0 0 15px rgba(168,85,247, 0.4); border-color: rgba(168,85,247, 0.8); transform: scale(1.02); }
        }
        .ad-card { animation: neon-glow-pulse 4s infinite alternate ease-in-out; }
        .ad-card:nth-child(even) { animation-delay: -2s; animation-direction: alternate-reverse; }

        @keyframes ticker-ltr {
            from { transform: translateX(-100vw); }
            to { transform: translateX(100vw); }
        }
        .animate-ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker-ltr linear infinite;
        }
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            display: flex;
            align-items: center;
        }

        .glass-panel {
            background: rgba(11, 20, 55, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* لتنسيق حقل التاريخ */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>

        const fullDefaultFields = [

            { id: 'f5', section: 'personal', label: 'الموقف من التجنيد أو الخدمة العامة', type: 'select', options: ['أدى الخدمة', 'إعفاء نهائى', 'إعفاء مؤقت', 'غير مطلوب .. "للبنات فقط"'], required: true, visible: true },
            { id: 'f6', section: 'personal', label: 'الحالة الصحية', type: 'text', required: true, visible: true },
            { id: 'f7', section: 'contact', label: 'عنوان بريد إلكتروني', type: 'email', required: true, visible: true },
            { id: 'f8', section: 'contact', label: 'رقم المحمول الأساسي', type: 'tel', required: true, visible: true },

            { id: 'f11', section: 'contact', label: 'العنوان بالتفصيل', type: 'textarea', required: true, visible: true },
            { id: 'f12', section: 'qualifications', label: 'المؤهل', type: 'select', options: ['بدون', 'دبلوم', 'معهد', 'كلية'], required: true, visible: true },
            { id: 'f13', section: 'qualifications', label: 'المؤهل والتخصص الدقيق', type: 'text', required: true, visible: true },
            { id: 'f14', section: 'qualifications', label: 'تاريخ التخرج', type: 'date', required: true, visible: true },
            { id: 'f15', section: 'experience', label: 'الوظيفة المطلوبة', type: 'text', required: true, visible: true },
            { id: 'f16', section: 'experience', label: 'الراتب المتوقع', type: 'text', required: true, visible: true },
            { id: 'f17', section: 'experience', label: 'الوظيفة الأولى', type: 'text', required: false, visible: true },
            { id: 'f18', section: 'experience', label: 'الوظيفة الثانية', type: 'text', required: false, visible: true },
            { id: 'f19', section: 'experience', label: 'الوظيفة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f20', section: 'experience', label: 'كم عدد الوظائف السابقة', type: 'number', required: false, visible: true },
            { id: 'f21', section: 'experience', label: 'كم عاما قضيتها فى سوق العمل؟', type: 'number', required: true, visible: true },
            { id: 'f22', section: 'skills', label: 'درجة إجادة اللغة الإنجليزية؟', type: 'select', options: ['ضعيف', 'مقبول', 'جيد', 'جيد جدًا', 'ممتاز'], required: true, visible: true },
            { id: 'f23', section: 'skills', label: 'هل تجيد لغات أخرى؟', type: 'text', required: true, visible: true },
            { id: 'f24', section: 'skills', label: 'هل تجيد قيادة السيارات أو الدراجات النارية؟', type: 'select', options: ['نعم', 'لا', 'إلى حدٍ ما'], required: true, visible: true },
            { id: 'f25', section: 'skills', label: 'هل لديك رخصة قيادة؟', type: 'select', options: ['نعم', 'لا'], required: true, visible: true },
            { id: 'f26', section: 'skills', label: 'المهارة/الخبرة الأولى', type: 'text', required: false, visible: true },
            { id: 'f27', section: 'skills', label: 'المهارة/الخبرة الثانية', type: 'text', required: false, visible: true },
            { id: 'f28', section: 'skills', label: 'المهارة/الخبرة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f29', section: 'skills', label: 'هل لديك أى معلومات أو مهارات ترغب فى إضافتها؟', type: 'textarea', required: true, visible: true },
            { id: 'f30', section: 'bonus', label: 'رشح أحد أصدقائك (اسمه ورقم تليفونه)', type: 'text', required: false, visible: true }
        ];

        // --- State Management ---
        window.JobAppState = {
            isOffline: false, 
            view: 'home',
            authMode: 'login', 
            
            siteSettings: {
                name: 'منصة توظيف المصرية لخدمات الموارد البشرية وظفنى.كوم _ wzfny.com', 
                logo: '', 
                adminName: 'خالد محي الدين', 
                adminRole: 'مدير الموقع', 
                adminPhone: '01144800777', 
                adminEmail: 'khmohieldin@gmail.com', 
                aboutUs: 'منصة وظفني هي المنصة الأولى من نوعها...', 
                seekerPortalImg: '', 
                employerPortalImg: '', 
                tickerEnabled: true, 
                tickerSpeed: 30, 
                tickerMode: 'auto', 
                tickerManualText: '',
                visitorsCount: 1500 // عداد مبدئي للزوار
            },
            
            secretClickCount: 0,
            loggedInAdmin: null,
            adminRecoveryMode: false,
            loggedInUser: null,
            preRegData: { role: 'seeker' }, 
            
            tempSeekerImage: '',
            tempIdImage: '',
            tempCertImage: '',
            tempAdImage: '',
            tempRating: 0,
            lastSubmittedSeeker: null, 

            adFormType: 'external',
            adminAddUserRole: 'seeker', 
            modals: { login: false, request: false, rating: false, adDetails: false, adminRequestDetails: null, userDetails: null, adminAddUser: false, bulkAdd: false },
            selectedItem: null, 
            search: { term: '', filterJob: 'الكل', filterExp: 'الكل' },
            adminTab: 'system_admins',
            usersSubTab: 'seekers',

            // Data Arrays
            systemAdmins: [{ id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '01144800777', password: '123456', type: 'super_admin', profileImage: '', website: 'https://khaled-tech.com', color: 'green' }],
            messages: [], 
            formFields: [...fullDefaultFields], 
            seekers: [],
            employers: [],
            requests: [],
            ads: []
        };

        // --- Global Secret Click Listener ---
        window.secretClickTimer = null;
        document.addEventListener('click', function(e) {
            if (JobAppState.modals.login || JobAppState.loggedInAdmin) return;
            const isInteractive = e.target.closest('button, a, input, select, textarea, label, [onclick]');
            if (isInteractive) return;

            JobAppState.secretClickCount++;
            clearTimeout(window.secretClickTimer);
            window.secretClickTimer = setTimeout(function() { JobAppState.secretClickCount = 0; }, 3000);

            if (JobAppState.secretClickCount >= 5) {
                JobAppState.secretClickCount = 0;
                JobAppState.modals.login = true;
                JobApp.render();
            }
        });

        // --- Firebase Initial Seeder & Visitor Counter ---
        async function seedDefaultsAndCount() {
            try {
                const settingsRef = doc(db, 'settings', 'global');
                const settingsSnap = await getDoc(settingsRef);
                
                if(!settingsSnap.exists()) {
                    await setDoc(settingsRef, JobAppState.siteSettings);
                } else {
                    // Increment visitor count
                    await updateDoc(settingsRef, { visitorsCount: increment(1) });
                }

                const adminsSnap = await getDocs(collection(db, 'systemAdmins'));
                if(adminsSnap.empty) {
                    await addDoc(collection(db, 'systemAdmins'), JobAppState.systemAdmins[0]);
                }
                const fieldsSnap = await getDocs(collection(db, 'formFields'));
                if(fieldsSnap.empty || fieldsSnap.size < 15) {
                    for(let f of fullDefaultFields) {
                        await setDoc(doc(db, 'formFields', f.id), f);
                    }
                }
            } catch (e) { console.log("Seeding skipped due to network/rules", e); }
        }

        // --- Core Framework ---
        window.JobApp = {
            renderTimer: null,
            init: async function() {
                this.syncSession(); // محاولة استعادة الجلسة مباشرة
                this.render(); 

                try {
                    if (window.location.protocol === 'file:') throw new Error("PROTOCOL_ERROR");
                    await signInAnonymously(auth);
                    await seedDefaultsAndCount();
                    
                    onSnapshot(doc(db, 'settings', 'global'), doc => { if(doc.exists()) { JobAppState.siteSettings = doc.data(); this.syncSession(); this.render(); }});
                    onSnapshot(collection(db, 'systemAdmins'), snap => { JobAppState.systemAdmins = snap.docs.map(d => ({id: d.id, ...d.data()})); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'formFields'), snap => { JobAppState.formFields = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a, b) => parseInt(a.id.replace('f', '')) - parseInt(b.id.replace('f', ''))); this.render(); });
                    onSnapshot(collection(db, 'seekers'), snap => { JobAppState.seekers = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.rating - a.rating); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'employers'), snap => { JobAppState.employers = snap.docs.map(d => ({id: d.id, ...d.data()})); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'requests'), snap => { JobAppState.requests = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'ads'), snap => { JobAppState.ads = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'messages'), snap => { JobAppState.messages = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });

                } catch(e) {
                    console.warn("تنبيه: تعمل المنصة في وضع التجربة المحلي (الذاكرة المؤقتة). للربط السحابي، استخدم Live Server.", e);
                    JobAppState.isOffline = true;
                    JobAppState.siteSettings.visitorsCount++; // زيادة وهمية
                    this.render(); 
                }
            },
            
            // دالة التزامن للحفاظ على المستخدم مسجلاً وتحديث بياناته مباشرة
            syncSession: function() {
                if (JobAppState.loggedInUser) {
                    if (JobAppState.loggedInUser.role === 'seeker') {
                        const updated = JobAppState.seekers.find(s => s.id === JobAppState.loggedInUser.id);
                        if (updated) JobAppState.loggedInUser = { ...updated, role: 'seeker' };
                    } else if (JobAppState.loggedInUser.role === 'employer') {
                        const updated = JobAppState.employers.find(e => e.id === JobAppState.loggedInUser.id);
                        if (updated) JobAppState.loggedInUser = { ...updated, role: 'employer' };
                    }
                } else {
                    const uAuth = localStorage.getItem('wzafny_user');
                    if (uAuth) {
                        try {
                            const { id, role } = JSON.parse(uAuth);
                            if (role === 'seeker') {
                                const s = JobAppState.seekers.find(x => x.id === id);
                                if (s) JobAppState.loggedInUser = { ...s, role };
                            } else if (role === 'employer') {
                                const e = JobAppState.employers.find(x => x.id === id);
                                if (e) JobAppState.loggedInUser = { ...e, role };
                            }
                        } catch(e) {}
                    }
                }

                if (JobAppState.loggedInAdmin) {
                    const updated = JobAppState.systemAdmins.find(a => a.id === JobAppState.loggedInAdmin.id);
                    if(updated) JobAppState.loggedInAdmin = updated;
                } else {
                    const aAuth = localStorage.getItem('wzafny_admin');
                    if (aAuth) {
                        try {
                            const { email, pass } = JSON.parse(aAuth);
                            const a = JobAppState.systemAdmins.find(x => x.email === email && x.password === pass);
                            if (a) JobAppState.loggedInAdmin = a;
                        } catch(e) {}
                    }
                }
            },

            // دالة الرندر مزودة بـ Debounce لمنع الرعشة عند التحميل المتعدد
            render: function() {
                if (this.renderTimer) clearTimeout(this.renderTimer);
                this.renderTimer = setTimeout(() => this._doRender(), 50);
            },

            _doRender: function() {
                const appDiv = document.getElementById('app');
                if (!appDiv) return;

                let currentViewHtml = '';
                if (this.views && typeof this.views[JobAppState.view] === 'function') {
                    currentViewHtml = this.views[JobAppState.view]();
                } else {
                    currentViewHtml = this.views.home();
                }

                appDiv.innerHTML = `
                    ${this.components.Header()}
                    <main class="flex-grow pb-20">
                        ${currentViewHtml}
                    </main>
                    ${this.components.Modals()}
                `;
                
                if (window.lucide) { lucide.createIcons(); }
            },
            navigate: function(view) {
                JobAppState.view = view;
                this.render();
                window.scrollTo(0, 0);
            },
            whatsappLink: function(phone) {
                if (!phone) return '#';
                let f = phone.replace(/\D/g, '');
                if (f.startsWith('01')) f = '2' + f;
                return `https://wa.me/${f}`;
            },

            // --- Actions ---
            actions: {
                adminLogin(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    const admin = JobAppState.systemAdmins.find(a => a.email === email && a.password === pass);
                    if (admin) {
                        JobAppState.loggedInAdmin = admin;
                        localStorage.setItem('wzafny_admin', JSON.stringify({ email: admin.email, pass: admin.password })); // حفظ الجلسة
                        JobAppState.modals.login = false;
                        JobAppState.adminRecoveryMode = false;
                        JobApp.navigate('admin_dashboard');
                    } else {
                        alert('بيانات الدخول غير صحيحة!');
                    }
                },
                adminRecoverySubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const exists = JobAppState.systemAdmins.some(a => a.email === email);
                    if (exists) {
                        alert('تم إرسال رابط استعادة كلمة المرور إلى البريد الإلكتروني للمدير بنجاح!');
                        JobAppState.adminRecoveryMode = false;
                        JobApp.render();
                    } else {
                        alert('هذا البريد الإلكتروني غير مسجل كمدير في النظام.');
                    }
                },
                startAuth(mode, role = 'seeker') {
                    JobAppState.authMode = mode;
                    JobAppState.preRegData.role = role;
                    JobApp.navigate('auth');
                },
                userLoginSubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    
                    let user = JobAppState.seekers.find(s => s.email === email && s.password === pass);
                    if (user) {
                        JobAppState.loggedInUser = { ...user, role: 'seeker' };
                        localStorage.setItem('wzafny_user', JSON.stringify({ id: user.id, role: 'seeker' })); // حفظ الجلسة
                        JobAppState.modals.userLogin = false;
                        JobApp.navigate('seeker_profile'); 
                        return;
                    }
                    
                    user = JobAppState.employers.find(emp => emp.email === email && emp.password === pass);
                    if (user) {
                        JobAppState.loggedInUser = { ...user, role: 'employer' };
                        localStorage.setItem('wzafny_user', JSON.stringify({ id: user.id, role: 'employer' })); // حفظ الجلسة
                        JobAppState.modals.userLogin = false;
                        JobApp.navigate('employer_form');
                        return;
                    }
                    
                    alert('البريد الإلكتروني أو كلمة المرور غير صحيحة.');
                },
                secretClick() {
                    // مُعالجة النقرة السرية تم تداركها بالكامل بالأسفل بالاعتماد على event listener عام
                },
                userLogout() {
                    JobAppState.loggedInUser = null;
                    JobAppState.loggedInAdmin = null;
                    localStorage.removeItem('wzafny_user');
                    localStorage.removeItem('wzafny_admin');
                    JobApp.navigate('home');
                },
                userRecoverySubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const existsSeeker = JobAppState.seekers.some(s => s.email === email);
                    const existsEmp = JobAppState.employers.some(emp => emp.email === email);
                    
                    if (existsSeeker || existsEmp) {
                        alert('تم إرسال تعليمات استعادة كلمة المرور إلى بريدك بنجاح!');
                        JobAppState.authMode = 'login';
                        JobApp.render();
                    } else {
                        alert('عفواً، هذا البريد غير مسجل لدينا.');
                    }
                },
                async submitRegister(e) {
                    e.preventDefault();
                    const name = e.target.name.value;
                    const email = e.target.email.value;
                    const password = e.target.password.value;
                    const role = e.target.role.value;
                    const refCodeInput = e.target.refCode ? e.target.refCode.value.trim() : '';
                    
                    if(JobAppState.seekers.some(s => s.email === email) || JobAppState.employers.some(emp => emp.email === email)) {
                        return alert("هذا البريد الإلكتروني مستخدم بالفعل. يرجى تسجيل الدخول.");
                    }

                async submitRating(e) {
                    e.preventDefault();
                    const stars = JobAppState.tempRating;
                    const feedback = e.target.feedback.value;
                    
                    if(stars < 1 || stars > 5) return alert("يرجى اختيار التقييم بالنجوم أولاً");
                    if(!feedback.trim()) return alert("يرجى كتابة تعليق يوضح سبب التقييم (إجباري)");
                    
                    const req = JobAppState.selectedItem;
                    const emp = JobAppState.employers.find(x => x.id === JobAppState.loggedInUser.id);
                    const seeker = JobAppState.seekers.find(s => s.id === req.seeker.id);

                    try {
                        if (!JobAppState.isOffline) {
                            await updateDoc(doc(db, 'requests', req.id), { isRated: true, ratingGiven: stars, ratingFeedback: feedback });
                            if(emp) await updateDoc(doc(db, 'employers', emp.id), { points: emp.points + 5 });
                            if(seeker) {
                                const newCount = seeker.reviewsCount + 1;
                                const newRating = Number((((seeker.rating * seeker.reviewsCount) + stars) / newCount).toFixed(1));
                                await updateDoc(doc(db, 'seekers', seeker.id), { reviewsCount: newCount, rating: newRating });
                            }
                        } else {
                            req.isRated = true; req.ratingGiven = stars; req.ratingFeedback = feedback;
                            if(emp) emp.points += 5;
                            if(seeker) {
                                seeker.reviewsCount++;
                                seeker.rating = Number((((seeker.rating * (seeker.reviewsCount - 1)) + stars) / seeker.reviewsCount).toFixed(1));
                            }
                        }

                        JobAppState.modals.rating = false;
                        alert('تم التقييم بنجاح! تم إضافة 5 نقاط إلى حساب شركتك 🎁 وتم احتساب التقييم للموظف.');
                        JobApp.render();
                    } catch(err) {
                        alert("خطأ أثناء تسجيل التقييم: " + err.message);
                    }
                },

                uploadImage(inputElement, callbackKey) {
                    const file = inputElement.files[0];
                    if(!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = event => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 600;
                            let width = img.width;
                            let height = img.height;
                            if (width > MAX_WIDTH) { height = height * (MAX_WIDTH / width); width = MAX_WIDTH; }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 

                            if(callbackKey === 'siteLogo') { JobAppState.siteSettings.logo = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'seekerPortalImg') { JobAppState.siteSettings.seekerPortalImg = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'employerPortalImg') { JobAppState.siteSettings.employerPortalImg = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempSeekerImage') { JobAppState.tempSeekerImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempIdImage') { JobAppState.tempIdImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempCertImage') { JobAppState.tempCertImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempAdImage') { JobAppState.tempAdImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'employerProfileImage') {
                                const emp = JobAppState.employers.find(e => e.id === JobAppState.loggedInUser.id);
                                if(emp) {
                                    emp.profileImage = compressedBase64;
                                    if(!JobAppState.isOffline) updateDoc(doc(db, 'employers', emp.id), { profileImage: compressedBase64 }).catch(e=>console.log(e));
                                }
                                JobAppState.loggedInUser.profileImage = compressedBase64;
                                JobApp.render();
                            }
                        }
                    }
                    reader.readAsDataURL(file);
                },

                    if(field) {

                async handleAddNewField(e) {
                    e.preventDefault();
                    const label = e.target.label.value;
                    const section = e.target.section.value;
                    const type = e.target.type.value;
                    const required = e.target.required.checked;
                    const optionsString = e.target.optionsString ? e.target.optionsString.value : '';

                    if(!label) return;
                    const fieldToAdd = {
                        id: 'f' + Date.now(), section, label, type, required, visible: true,
                        options: type === 'select' ? optionsString.split(',').map(s => s.trim()) : null
                    };
                    
                    try {
                        if (!JobAppState.isOffline) await setDoc(doc(db, 'formFields', fieldToAdd.id), fieldToAdd);
                        else { JobAppState.formFields.push(fieldToAdd); JobApp.render(); }
                        alert("تم إضافة الحقل بنجاح");

                    let data = type === 'seeker' ? JobAppState.seekers.find(s => s.id === id) : JobAppState.employers.find(e => e.id === id);

                async removeSystemAdmin(id) {
                    if(window.confirm('هل أنت متأكد من إزالة هذا المدير؟')) {
                        try {
                            if (!JobAppState.isOffline) await deleteDoc(doc(db, 'systemAdmins', id));

                },
                async handleAddSystemAdmin(e) {
                    e.preventDefault();
                    const roleType = e.target.roleType.value; // 'super_admin' or 'sub_admin'
                    const newAdmin = {
                        name: e.target.name.value,
                        email: e.target.email.value,
                        password: e.target.password.value,
                        phone: '',
                        role: roleType === 'super_admin' ? 'مدير عام' : 'مسئول مساعد',
                        type: roleType,
                        color: roleType === 'super_admin' ? 'red' : 'blue',
                        website: ''
                    };
                    try {
                        if (!JobAppState.isOffline) await addDoc(collection(db, 'systemAdmins'), newAdmin);
                        else { 
                            newAdmin.id = 'admin_' + Date.now();
                            JobAppState.systemAdmins.push(newAdmin); 
                            JobApp.render(); 
                        }
                        alert("تم إضافة المدير بنجاح!");
                    } catch(err) {
                        alert("حدث خطأ: " + err.message);
                    }
                },
                async handleBulkAdd(e) {
                    e.preventDefault();
                    const csv = e.target.csvData.value;
                    const rows = csv.split('\n');
                    let added = 0;
                    for(let row of rows) {
                        const cols = row.split(',');
                        if(cols.length >= 2) {
                            const newSeeker = { 
                                name: cols[0].trim(), 
                                email: cols[1].trim(), 
                                password: cols[2] ? cols[2].trim() : '123456', 
                                jobTitle: cols[3] ? cols[3].trim() : 'غير محدد', 
                                phone: cols[4] ? cols[4].trim() : '', 
                                experience: 0, 
                                skills: [], 
                                isVisible: true, 
                                isHired: false, 
                                rating: 0, 
                                reviewsCount: 0, 
                                profileImage: '', 
                                formData: {} 
                            };
                            if (!JobAppState.isOffline) await addDoc(collection(db, 'seekers'), newSeeker);
                            else { 
                                newSeeker.id = Date.now().toString() + Math.random(); 
                                JobAppState.seekers.unshift(newSeeker); 
                            }
                            added++;
                        }
                    }
                    alert(`تمت إضافة ${added} موظفين بنجاح`);
                    JobAppState.modals.bulkAdd = false; 
                    JobApp.render();
                },
                
                // تحديث الفلاتر لإعادة رسم الصفحة تلقائياً
                setSearchFilter(key, val) { 
                    JobAppState.search[key] = val; 
                    JobApp.render(); 
                },
                
                // دالة البحث الحية مع دعم القوائم المنسدلة
                filterSeekers(e) {
                    // تحديث الكلمة المبحوث عنها فقط، دون إعادة رسم الصفحة للحفاظ على التركيز في الحقل
                    JobAppState.search.term = e.target.value.toLowerCase(); 
                    
                    const term = JobAppState.search.term;
                    const fJob = JobAppState.search.filterJob || 'الكل';
                    const fExp = JobAppState.search.filterExp || 'الكل';

                    const cards = document.querySelectorAll('.seeker-card-wrapper');
                    let visibleCount = 0;
                    
                    cards.forEach(card => {
                        const text = card.getAttribute('data-search-text').toLowerCase();
                        const job = card.getAttribute('data-job');
                        const exp = parseInt(card.getAttribute('data-exp') || '0');
                        
                        let match = true;
                        if(term && !text.includes(term)) match = false;
                        if(fJob !== 'الكل' && job !== fJob) match = false;
                        if(fExp !== 'الكل' && exp < parseInt(fExp)) match = false;

                        if(match) {
                            card.style.display = 'flex';
                            visibleCount++;
                        } else {
                            card.style.display = 'none';
                        }
                    });
                    
                    const emptyMsg = document.getElementById('empty-search-msg');
                    if(emptyMsg) emptyMsg.style.display = visibleCount === 0 ? 'block' : 'none';
                }

                        requestsHtml = '<p class="text-slate-400 text-sm text-center py-4 bg-black/20 rounded-xl border border-dashed border-white/10">لم تقم بطلب أي موظفين للتعيين حتى الآن.</p>';
                    } else {
                        requestsHtml = myRequests.map(req => {
                            const reqSeeker = JobAppState.seekers.find(sx => sx.id === req.seeker.id) || req.seeker;
                            return `
                            <div class="bg-black/30 border border-white/10 p-4 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-3 hover:border-purple-500/30 transition-colors">
                                <div>
                                    <h4 class="text-white font-bold text-sm md:text-base">${reqSeeker.name ? reqSeeker.name.split(' ')[0] : 'موظف'} ***</h4>
                                    <p class="text-slate-400 text-xs">${reqSeeker.jobTitle || 'غير محدد'} | تاريخ الطلب: ${req.date}</p>
                                </div>
                                <div>
                                    ${req.isRated ? 
                                        `<span class="text-emerald-400 text-xs font-bold flex items-center gap-1 bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20"><i data-lucide="check-circle" class="w-4 h-4"></i> قيمته بـ ${req.ratingGiven} نجوم</span>` : 
                                        `<button type="button" onclick="JobApp.actions.openRatingModal('${req.id}')" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-1 transition-colors shadow-lg"><i data-lucide="star" class="w-4 h-4"></i> تقييم الموظف للحصول على نقاط</button>`
                                    }
                                </div>
                            </div>`;
                        }).join('');
                    }

                    return `
                    <div class="max-w-4xl mx-auto px-4 pt-8 md:pt-12 fade-in pb-20">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl md:text-4xl font-black text-white mb-2">الملف التعريفي للشركة</h2>
                            <p class="text-sm md:text-base text-purple-200/80">حدث بياناتك لتسهيل عملية التواصل. بيانات التواصل (الرقم) مخفية وتظهر للإدارة فقط.</p>
                        </div>
                        
                        <div class="glass-panel p-6 md:p-8 rounded-3xl shadow-[0_0_50px_rgba(168,85,247,0.1)] border-purple-500/20">
                            <form onsubmit="JobApp.actions.submitEmployerProfile(event)" autocomplete="off">
                                <div class="flex flex-col items-center mb-8">
                                    <label class="cursor-pointer group relative">
                                        <div class="w-24 h-24 md:w-32 md:h-32 bg-white/5 rounded-full border-2 border-dashed border-purple-500/50 flex flex-col items-center justify-center text-purple-300 overflow-hidden hover:bg-white/10 transition-all shadow-[0_0_15px_rgba(168,85,247,0.2)]">
                                            ${currentImage ? `<img src="${currentImage}" class="w-full h-full object-cover">` : `<i data-lucide="building-2" class="w-6 h-6 md:w-8 md:h-8 mb-2"></i><span class="text-[10px] md:text-xs font-bold text-center px-2">شعار الشركة</span>`}
                                        </div>
                                        <input type="file" accept="image/*" class="hidden" onchange="JobApp.actions.uploadImage(this, 'tempSeekerImage')">
                                    </label>
                                </div>
                                
                                <div class="grid md:grid-cols-2 gap-4 md:gap-6 mb-6">
                                    <div>
                                        <label class="block text-xs md:text-sm font-bold text-purple-100 mb-2">اسم الشركة / المؤسسة <span class="text-rose-400">*</span></label>
                                        <input name="companyName" value="${user.name || ''}" required class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-purple-400">
                                    </div>
                                    <div>
                                        <label class="block text-xs md:text-sm font-bold text-purple-100 mb-2 flex items-center gap-2">رقم التواصل المعتمد <span class="text-rose-400">*</span> <i data-lucide="lock" class="w-3 h-3 text-emerald-400" title="سري للإدارة فقط"></i></label>
                                        <input name="companyPhone" type="tel" value="${user.phone || ''}" dir="ltr" required placeholder="01xxxxxxxxx" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-emerald-500/30 text-white text-base outline-none focus:border-purple-400 text-left">
                                    </div>
                                    <div>
                                        <label class="block text-xs md:text-sm font-bold text-purple-100 mb-2">رقم السجل التجاري / البطاقة الضريبية</label>
                                        <input name="companyRegNum" value="${user.companyRegNum || ''}" dir="ltr" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-purple-400 text-left">
                                    </div>
                                    <div>
                                        <label class="block text-xs md:text-sm font-bold text-purple-100 mb-2">مجال العمل / النشاط الأساسي</label>
                                        <input name="industry" value="${user.industry || ''}" placeholder="مثل: مقاولات، برمجيات، تجارة..." class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-purple-400">
                                    </div>
                                    <div>
                                        <label class="block text-xs md:text-sm font-bold text-purple-100 mb-2">عدد الموظفين التقريبي (حجم الشركة)</label>
                                        <input name="employeeCount" value="${user.employeeCount || ''}" type="number" dir="ltr" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-purple-400 text-left">
                                    </div>
                                    <div>
                                        <label class="block text-xs md:text-sm font-bold text-purple-100 mb-2">المدينة / مقر الإدارة</label>
                                        <input name="city" value="${user.city || ''}" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-purple-400">
                                    </div>
                                </div>
                                
                                <div class="mb-8">
                                    <label class="block text-xs md:text-sm font-bold text-purple-100 mb-2">نبذة عن الشركة ومجال العمل (اختياري)</label>
                                    <textarea name="companyDesc" rows="4" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-purple-400 resize-none" placeholder="نحن شركة تعمل في مجال...">${user.companyDesc || ''}</textarea>
                                </div>
                                
                                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-fuchsia-500 text-white font-extrabold py-4 rounded-xl shadow-[0_0_20px_rgba(168,85,247,0.4)] text-lg hover:scale-[1.01] transition-transform flex items-center justify-center gap-2">
                                    <i data-lucide="save" class="w-5 h-5"></i> حفظ وتحديث بيانات الشركة
                                </button>
                            </form>
                        </div>
                        
                        <div class="mt-6 flex items-center justify-between bg-amber-500/10 border border-amber-500/30 p-6 rounded-3xl mb-8 shadow-lg">
                            <div class="flex items-center gap-4">
                                <div class="bg-amber-500/20 p-3 rounded-2xl text-amber-400"><i data-lucide="star" class="w-8 h-8"></i></div>
                                <div>
                                    <div class="text-white font-bold text-lg md:text-xl">نقاط الشركة المكتسبة</div>
                                    <div class="text-amber-200/70 text-xs md:text-sm font-medium mt-1">احصل على مزيد من النقاط عند تقييمك للموظفين بعد المقابلة</div>
                                </div>
                            </div>
                            <div class="text-4xl md:text-5xl font-black text-amber-400 tracking-wider">${user.points||0}</div>
                        </div>

                        <div class="glass-panel p-6 md:p-8 rounded-3xl shadow-[0_0_50px_rgba(168,85,247,0.1)] border-blue-500/20">
                            <h3 class="text-xl md:text-2xl font-bold text-white mb-6 flex items-center gap-2"><i data-lucide="briefcase" class="w-6 h-6 text-blue-400"></i> طلباتي السابقة للتوظيف</h3>
                            <div class="space-y-3">
                                ${requestsHtml}
                            </div>
                        </div>
                    </div>`;
                },

                employer_form() {
                    const currentUserPhone = JobAppState.loggedInUser ? JobAppState.loggedInUser.phone : null;
                    const searchTerm = JobAppState.search.term || '';
                    const filterJob = JobAppState.search.filterJob || 'الكل';
                    const filterExp = JobAppState.search.filterExp || 'الكل';

                    // جلب الوظائف المتاحة للفلتر لاستخدامها في الـ Select
                    const uniqueJobs = [...new Set(JobAppState.seekers.filter(s=>s.isVisible && s.jobTitle).map(s=>s.jobTitle))];

                    let seekersHtml = JobAppState.seekers.filter(s => s.isVisible).map(s => {
                        
                        const myReq = JobAppState.requests.find(r => r.seeker.id === s.id && r.employerPhone === currentUserPhone);
                        
                        let actionButtonHtml = '';
                        if (s.isHired) {
                            actionButtonHtml = `<button disabled class="mt-auto w-full bg-[#111] text-rose-400/80 font-bold py-3 md:py-4 rounded-xl flex items-center justify-center gap-2 text-xs md:text-sm border border-rose-500/20 cursor-not-allowed opacity-90 transition-all"><i data-lucide="lock" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> تم عقد عمل مع شركة من خلال الموقع</button>`;
                        } 
                        else if (myReq) {
                            if (myReq.isRated) {
                                actionButtonHtml = `<button disabled class="mt-auto w-full bg-emerald-600/20 text-emerald-400 font-bold py-3 md:py-4 rounded-xl flex items-center justify-center gap-2 text-sm md:text-base border border-emerald-500/30 cursor-not-allowed"><i data-lucide="check-circle" class="w-4 h-4 md:w-5 md:h-5"></i> تم التقييم مسبقاً</button>`;
                            } else {
                                actionButtonHtml = `<button onclick="JobApp.actions.openRatingModal('${myReq.id}')" class="mt-auto w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white font-black py-3 md:py-4 rounded-xl shadow-[0_0_20px_rgba(245,158,11,0.4)] flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform text-sm md:text-base"><i data-lucide="star" class="w-4 h-4 md:w-5 md:h-5"></i> تقييم الموظف (اربح نقاط)</button>`;
                            }
                        } 
                        else {
                            actionButtonHtml = `<button onclick="JobApp.actions.openRequestModal('${s.id}')" class="mt-auto w-full bg-gradient-to-r from-purple-600 to-fuchsia-500 text-white font-black py-3 md:py-4 rounded-xl shadow-[0_0_20px_rgba(168,85,247,0.4)] flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform text-sm md:text-base"><i data-lucide="send" class="w-4 h-4 md:w-5 md:h-5"></i> طلب تعيين (عرض الاتصال)</button>`;
                        }

                        // إنشاء نصوص البحث
                        let searchableData = `${s.name} ${s.jobTitle} ${s.location} ${s.experience} ${s.skills.join(' ')} ${s.topStrengths} ${s.bio}`;

                        let formDetailsHtml = '';
                        if (s.formData) {
                            // إخفاء حقول الاتصال تماماً كما طلبت (إظهار كافة التفاصيل المخفية للشركة، وإبقاء الاتصال مخفياً)
                            const excludedContactFields = ['f7', 'f8', 'f9', 'f9_name', 'f10', 'f11', 'f31'];
                            const titleFields = ['f1', 'f15']; // معروضة أساساً بالبطاقة

                            const allExcludes = [...excludedContactFields, ...titleFields];
                            
                            const allowedFields = JobAppState.formFields.filter(f => !allExcludes.includes(f.id) && s.formData[f.id]);
                            
                            allowedFields.forEach(f => searchableData += ` ${s.formData[f.id]}`);

                            if(allowedFields.length > 0) {
                                formDetailsHtml = `
                                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2.5 mb-5">
                                    ${allowedFields.map(f => `
                                        <div class="flex flex-col bg-white/[0.03] p-2.5 rounded-xl border border-white/5 shadow-inner">
                                            <span class="text-[10px] md:text-xs text-purple-300/70 mb-0.5 flex items-center gap-1 font-bold"><i data-lucide="minus" class="w-2.5 h-2.5 text-purple-500"></i> ${f.label}</span>
                                            <span class="text-xs md:text-sm text-slate-100 font-semibold whitespace-pre-wrap leading-snug truncate" title="${s.formData[f.id]}">${s.formData[f.id]}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                `;
                            }
                        }

                        const isHiredClass = s.isHired ? 'grayscale-[60%] opacity-80 border-rose-500/20 bg-black/40' : 'hover:border-purple-500/40 border-white/10';
                        const ribbonClass = s.isHired ? 'bg-rose-600' : 'bg-gradient-to-b from-purple-400 to-fuchsia-600';

                        // نمرر البيانات للفلترة السريعة (DOM filter) لتفادي فقدان التركيز
                        return `
                        <div class="seeker-card-wrapper w-full flex" style="${(filterJob !== 'الكل' && s.jobTitle !== filterJob) || (filterExp !== 'الكل' && s.experience < parseInt(filterExp)) ? 'display:none;' : ''}" data-search-text="${searchableData.replace(/"/g, '&quot;')}" data-job="${s.jobTitle}" data-exp="${s.experience}">
                            <div class="glass-panel w-full rounded-3xl p-5 md:p-6 transition-all shadow-lg flex flex-col relative overflow-hidden border ${isHiredClass}">
                                <div class="absolute top-0 right-0 w-1.5 ${ribbonClass} h-full"></div>
                                ${s.isHired ? `<div class="absolute top-5 left-[-35px] bg-rose-600 text-white text-[10px] font-bold px-10 py-1 -rotate-45 shadow-lg z-10 flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> تم التوظيف</div>` : ''}
                                
                                <div class="flex gap-4 items-center mb-5 border-b border-white/5 pb-5">
                                    ${s.profileImage ? `<img src="${s.profileImage}" class="w-16 h-16 md:w-20 md:h-20 rounded-2xl object-cover border-2 ${s.isHired?'border-rose-500/30':'border-purple-500/30'} shadow-md shrink-0">` : `<div class="w-16 h-16 md:w-20 md:h-20 rounded-2xl ${s.isHired?'bg-rose-500/10 text-rose-400 border-rose-500/30':'bg-purple-500/10 text-purple-400 border-purple-500/30'} border flex items-center justify-center shrink-0"><i data-lucide="user" class="w-8 h-8 md:w-10 md:h-10"></i></div>`}
                                    <div class="flex-grow overflow-hidden">
                                        <h4 class="text-lg md:text-xl font-black text-white mb-2 flex flex-wrap items-center gap-2">${s.name || 'بدون اسم'} <span class="bg-rose-500/10 text-rose-400 text-[9px] px-2 py-0.5 rounded border border-rose-500/20 shrink-0 flex items-center gap-1"><i data-lucide="lock" class="w-2 h-2"></i> بيانات الاتصال مخفية</span></h4>
                                        <div class="flex flex-wrap items-center gap-2 text-xs md:text-sm text-purple-300">
                                            <span class="font-bold">${s.jobTitle || 'غير محدد'}</span>
                                            ${s.rating > 0 ? `<span class="bg-amber-500/10 text-amber-400 text-[10px] px-2.5 py-0.5 rounded-md border border-amber-500/20 flex items-center gap-1 font-bold"><i data-lucide="star" class="w-3.5 h-3.5 fill-amber-400"></i> التقييم: ${s.rating}</span>` : ''}
                                        </div>
                                    </div>
                                </div>
                                
                                ${formDetailsHtml}

                                <div class="mb-6 flex-grow bg-black/20 p-4 rounded-xl border border-white/5 shadow-inner">
                                    <h5 class="text-amber-400 text-[11px] md:text-xs font-bold mb-2.5 flex items-center gap-1.5"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i> مقتطفات ونبذة عن الأعمال:</h5>
                                    <div class="text-slate-300 text-xs md:text-sm leading-relaxed">
                                        <strong class="text-white">التميز:</strong> ${s.topStrengths || 'غير محدد'}<br/>
                                        ${s.bio && !s.hasBioViolation ? `<span class="block mt-2 pt-2 border-t border-white/5 whitespace-pre-wrap text-slate-300">${s.bio}</span>` : ''}
                                        ${!s.bio ? `<span class="text-slate-500 italic block mt-2 pt-2 border-t border-white/5">لم تتوفر نبذة إضافية.</span>` : ''}
                                        ${s.hasBioViolation && !s.bioApproved ? `<span class="text-rose-400 font-bold flex items-center gap-1 mt-2 border-t border-rose-500/20 pt-2"><i data-lucide="shield-alert" class="w-4 h-4"></i> النبذة مخفية (قيد المراجعة من الإدارة)</span>` : ''}
                                    </div>
                                    <div class="flex flex-wrap gap-1.5 mt-4">
                                        ${(s.skills || []).filter(sk => sk.trim() !== "").slice(0, 6).map(skill => `<span class="bg-purple-500/10 text-purple-200 text-[10px] md:text-xs px-2.5 py-1 rounded-md border border-purple-500/20 cursor-default hover:bg-purple-500/20 transition-colors">${skill}</span>`).join('')}
                                    </div>
                                </div>
                                ${actionButtonHtml}
                            </div>
                        </div>
                    `;
                    }).join('');

                    const emptyMsgHtml = `<div id="empty-search-msg" class="col-span-1 lg:col-span-2 text-center text-slate-400 p-8 border border-dashed border-slate-700 rounded-3xl text-sm md:text-base bg-black/30" style="display: none;">لا توجد نتائج مطابقة لعملية البحث الحالية.</div>`;

                    return `
                    <div class="max-w-7xl mx-auto px-4 pt-8 md:pt-12 fade-in pb-10">
                        <div class="glass-panel rounded-3xl p-6 md:p-8 mb-8 border-purple-500/30 shadow-[0_0_40px_rgba(168,85,247,0.1)] relative overflow-hidden">
                            <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-500/20 rounded-full blur-3xl pointer-events-none"></div>
                            
                            <div class="text-center mb-6 relative z-10">
                                <h2 class="text-2xl md:text-3xl font-black text-white mb-2 md:mb-3">ابحث عن موظفك المثالي</h2>
                                <p class="text-purple-200/70 font-medium text-sm md:text-base">استخدم شريط البحث للوصول السريع للمهارات، الأسماء، المسميات الوظيفية، أو المدن.</p>
                            </div>
                            
                            <div class="grid md:grid-cols-3 gap-4 relative z-10 max-w-4xl mx-auto">
                                <div>
                                    <label class="block text-xs font-bold text-purple-300 mb-1">بحث حر بالكلمات الدلالية</label>
                                    <div class="relative">
                                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><i data-lucide="search" class="w-5 h-5 text-purple-400"></i></div>
                                        <input type="text" id="searchInput" oninput="JobApp.actions.filterSeekers(event)" value="${term}" placeholder="ابحث بالاسم، المهارة..." class="w-full pl-4 pr-12 py-3 rounded-xl bg-black/40 border border-purple-500/40 text-white text-sm md:text-base outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-500/50 transition-all shadow-inner" autocomplete="off">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-purple-300 mb-1">فلترة بالمسمى الوظيفي</label>
                                    <select id="filterJob" onchange="JobApp.actions.setSearchFilter('filterJob', this.value)" class="w-full px-4 py-3 rounded-xl bg-black/40 border border-purple-500/40 text-white text-sm md:text-base outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-500/50 transition-all shadow-inner appearance-none cursor-pointer">
                                        <option value="الكل">جميع الوظائف المتاحة</option>
                                        ${uniqueJobs.map(j => `<option value="${j}" ${filterJob===j?'selected':''}>${j}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-purple-300 mb-1">الحد الأدنى لسنوات الخبرة</label>
                                    <select id="filterExp" onchange="JobApp.actions.setSearchFilter('filterExp', this.value)" class="w-full px-4 py-3 rounded-xl bg-black/40 border border-purple-500/40 text-white text-sm md:text-base outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-500/50 transition-all shadow-inner appearance-none cursor-pointer">
                                        <option value="الكل">كل الخبرات</option>
                                        <option value="1" ${filterExp==='1'?'selected':''}>1+ سنة خبرة</option>
                                        <option value="3" ${filterExp==='3'?'selected':''}>3+ سنوات خبرة</option>
                                        <option value="5" ${filterExp==='5'?'selected':''}>5+ سنوات خبرة</option>
                                        <option value="10" ${filterExp==='10'?'selected':''}>10+ سنوات خبرة (كفاءات)</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="grid lg:grid-cols-2 gap-6 md:gap-8" id="seekers-grid">
                            ${seekersHtml}
                            ${emptyMsgHtml}
                        </div>
                    </div>`;
                },

                admin_dashboard() {
                    const admin = JobAppState.loggedInAdmin;
                    if(!admin) return '<div class="text-center p-20 text-red-500 font-bold text-2xl">غير مصرح لك بالدخول، يرجى تسجيل الدخول كمسئول.</div>';

                    let tabContent = '';
                    
                    if (JobAppState.adminTab === 'system_admins') {
                        tabContent = `
                        <div class="glass-panel p-4 md:p-6 rounded-2xl mb-6 overflow-x-auto border border-white/10 shadow-lg">
                            <h3 class="text-lg md:text-xl font-bold text-emerald-400 mb-4 flex items-center gap-2"><i data-lucide="shield" class="w-5 h-5"></i> المدراء والمساعدين الحاليين</h3>
                            <div class="grid md:grid-cols-2 gap-4">
                                ${JobAppState.systemAdmins.map(a => `
                                <div class="p-4 md:p-6 rounded-2xl border flex items-start gap-3 md:gap-4 relative overflow-hidden ${a.color === 'green' ? 'bg-emerald-900/10 border-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : 'bg-blue-900/10 border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.1)]'}">

                                            ${s.hasBioViolation && !s.bioApproved ? `<button onclick="JobApp.actions.approveBio('${s.id}')" class="px-4 py-2 rounded-lg text-xs font-bold border flex items-center gap-1 bg-emerald-600/20 text-emerald-400 border-emerald-500/50 hover:bg-emerald-600 hover:text-white transition-colors shadow-md" title="الموافقة على النبذة رغم المخالفة"><i data-lucide="check-square" class="w-4 h-4"></i> السماح بالنبذة</button>` : ''}
                                            <button onclick="JobApp.actions.markAsHired('${s.id}')" class="px-4 py-2 rounded-lg text-xs font-bold border flex items-center gap-1 transition-colors shadow-md ${s.isHired ? 'bg-slate-700 text-slate-300 border-slate-600 hover:bg-slate-600' : 'bg-rose-600 text-white border-rose-500 hover:bg-rose-500'}"><i data-lucide="briefcase" class="w-4 h-4"></i> ${s.isHired ? 'إلغاء' : 'وظف'}</button>
                                            <span class="bg-amber-500/10 text-amber-400 px-3 py-2 rounded-lg border border-amber-500/30 text-xs font-bold flex items-center gap-1 shadow-inner"><i data-lucide="star" class="w-4 h-4 fill-amber-400"></i> ${s.rating}</span>
                                            <button onclick="JobApp.actions.toggleSeekerVisibility('${s.id}')" class="px-4 py-2 rounded-lg text-xs font-bold border flex items-center gap-1 shadow-md transition-colors ${s.isVisible ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30 hover:bg-emerald-500/20' : 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700'}"><i data-lucide="${s.isVisible ? 'eye' : 'eye-off'}" class="w-4 h-4"></i> ${s.isVisible ? 'مرئي' : 'مخفي'}</button>
                                            <button onclick="JobApp.actions.openUserDetails('seeker', '${s.id}')" class="bg-blue-600 hover:bg-blue-500 border border-blue-400 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-1 shadow-md transition-colors"><i data-lucide="file-text" class="w-4 h-4"></i> ملف الصور</button>
                                            <button onclick="JobApp.actions.deleteSeeker('${s.id}')" class="bg-slate-800 hover:bg-rose-600 border border-slate-700 hover:border-rose-500 text-slate-400 hover:text-white px-3 py-2 rounded-lg text-xs font-bold shadow-md transition-colors" title="حذف نهائي"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                `).join('')}
                            ` : `
                                <div class="bg-black/30 border border-purple-500/30 rounded-2xl p-6 shadow-inner mb-4 overflow-hidden">
                                    <div class="flex justify-between mb-6 items-center">
                                        <h2 class="text-xl text-white font-black flex items-center gap-2"><i data-lucide="table" class="text-purple-400"></i> جدول بيانات الشركات الشامل (Excel View)</h2>
                                        <div class="bg-purple-500/10 text-purple-300 px-4 py-2 rounded-lg font-bold border border-purple-500/20 text-sm">إجمالي: ${JobAppState.employers.length} شركة</div>
                                    </div>
                                    ${JobAppState.employers.length === 0 ? '<div class="text-slate-400 text-center py-12 border border-dashed border-white/10 rounded-xl font-bold text-lg"><i data-lucide="building" class="w-12 h-12 mx-auto mb-4 opacity-50"></i> لا يوجد شركات مسجلة في النظام.</div>' : `
                                    <div class="overflow-x-auto rounded-xl border border-white/10">
                                        <table class="w-full text-right text-sm text-slate-300 border-collapse whitespace-nowrap">
                                            <thead class="bg-[#111] text-white">
                                                <tr>
                                                    <th class="p-4 border-b border-white/10 font-black">الشركة / المؤسسة</th>
                                                    <th class="p-4 border-b border-white/10 font-black">رقم التواصل المعتمد</th>
                                                    <th class="p-4 border-b border-white/10 font-black">البريد الإلكتروني</th>
                                                    <th class="p-4 border-b border-white/10 font-black">سجل تجاري / ضريبي</th>
                                                    <th class="p-4 border-b border-white/10 font-black">مجال العمل</th>
                                                    <th class="p-4 border-b border-white/10 font-black">المدينة</th>
                                                    <th class="p-4 border-b border-white/10 font-black text-amber-400"><i data-lucide="star" class="w-4 h-4 inline fill-amber-400"></i> النقاط</th>
                                                    <th class="p-4 border-b border-white/10 font-black text-center">إجراءات</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${JobAppState.employers.map(e => `
                                                <tr class="hover:bg-white/5 transition-colors border-b border-white/5 last:border-0">
                                                    <td class="p-4 font-bold text-purple-300 flex items-center gap-3">
                                                        ${e.profileImage ? `<img src="${e.profileImage}" class="w-8 h-8 rounded-lg object-cover border border-purple-500/30">` : `<div class="w-8 h-8 rounded-lg bg-purple-500/10 border border-purple-500/30 flex items-center justify-center"><i data-lucide="building-2" class="w-4 h-4 text-purple-400"></i></div>`}
                                                        ${e.name}
                                                    </td>
                                                    <td class="p-4 font-mono font-bold" dir="ltr"><a href="tel:${e.phone}" class="hover:text-purple-400">${e.phone}</a></td>
                                                    <td class="p-4 font-mono text-xs">${e.email}</td>
                                                    <td class="p-4">${e.companyRegNum||'<span class="text-slate-500">-</span>'}</td>
                                                    <td class="p-4">${e.industry||'<span class="text-slate-500">-</span>'}</td>
                                                    <td class="p-4">${e.city||'<span class="text-slate-500">-</span>'}</td>
                                                    <td class="p-4 text-amber-400 font-black">${e.points||0}</td>
                                                    <td class="p-4 text-center">
                                                        <div class="flex items-center justify-center gap-2">
                                                            <button onclick="JobApp.actions.openUserDetails('employer', '${e.id}')" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white p-2 rounded-lg border border-blue-500/30 transition-colors" title="التفاصيل كاملة"><i data-lucide="info" class="w-4 h-4"></i></button>
                                                            <button onclick="JobApp.actions.deleteEmployer('${e.id}')" class="bg-rose-600/20 hover:bg-rose-600 text-rose-400 hover:text-white p-2 rounded-lg border border-rose-500/30 transition-colors" title="حذف الشركة نهائياً"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                                        </div>
                                                    </td>
                                                </tr>`).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                    `}
                                </div>
                            `}
                        </div>`;
                    }

                    if (admin.type === 'super_admin' && JobAppState.adminTab === 'settings_form') {
                        tabContent = `
                        <div class="bg-black/30 border border-amber-500/30 p-6 md:p-8 rounded-3xl mb-8 shadow-lg">
                            <h3 class="text-xl md:text-2xl font-black text-amber-400 mb-6 flex items-center gap-2 border-b border-white/10 pb-4"><i data-lucide="plus-square" class="w-6 h-6"></i> مصمم استمارة الموظفين (بناء حقل جديد)</h3>
                            <form onsubmit="JobApp.actions.handleAddNewField(event)" class="space-y-6" autocomplete="off">
                                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                                    <div><label class="block text-xs md:text-sm font-bold text-slate-300 mb-2">اسم الحقل (السؤال الموجه للموظف)</label><input name="label" required placeholder="مثال: هل تمتلك سيارة؟" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-amber-400 shadow-inner"></div>
                                    <div>
                                        <label class="block text-xs md:text-sm font-bold text-slate-300 mb-2">القسم</label>
                                        <select name="section" required class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-amber-400">
                                            <option value="personal">البيانات الشخصية</option>
                                            <option value="contact">بيانات الاتصال</option>
                                            <option value="qualifications">المؤهلات العلمية</option>
                                            <option value="experience">الخبرات والوظائف</option>
                                            <option value="skills">المهارات</option>
                                            <option value="bonus">معلومات إضافية</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs md:text-sm font-bold text-slate-300 mb-2">نوع إجابة الحقل</label>
                                        <select name="type" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-amber-400">
                                            <option value="text">نص (Text)</option>
                                            <option value="number">رقم (Number)</option>
                                            <option value="date">تاريخ (Date)</option>
                                            <option value="email">إيميل (Email)</option>
                                            <option value="tel">تليفون (Tel)</option>
                                            <option value="select">قائمة منسدلة (Select)</option>
                                            <option value="textarea">نص طويل (Textarea)</option>
                                        </select>
                                    </div>
                                    <div><label class="block text-xs md:text-sm font-bold text-slate-300 mb-2">خيارات القائمة المنسدلة (مفصولة بفاصلة)</label><input name="optionsString" placeholder="مثال: ذكر, أنثى" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-amber-400 shadow-inner"></div>
                                </div>
                                <div class="flex items-center gap-2 mt-4 pb-3"><input type="checkbox" name="required" id="reqField" class="w-5 h-5 accent-amber-500 rounded"><label for="reqField" class="text-sm font-bold text-white cursor-pointer">هل الإجابة إجبارية؟</label></div>
                                <div class="mt-6 flex justify-end"><button type="submit" class="bg-amber-500 hover:bg-amber-400 text-slate-900 font-black py-3 px-8 rounded-xl shadow-lg transition-all flex items-center gap-2"><i data-lucide="plus"></i> إضافة الحقل</button></div>
                            </form>
                        </div>

                        <div class="glass-panel p-6 md:p-8 rounded-3xl border border-white/10 shadow-lg">
                            <h3 class="text-lg md:text-xl font-bold text-white mb-6"><i data-lucide="list" class="inline w-5 h-5 text-amber-400 mr-2"></i> الحقول الحالية في الاستمارة (${JobAppState.formFields.length})</h3>
                            <div class="grid gap-3">
                                ${JobAppState.formFields.map(f => `
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between bg-black/40 p-4 rounded-xl border border-white/5 hover:border-amber-500/30 transition-colors gap-4">
                                        <div class="flex items-center gap-4">
                                            <div class="bg-amber-500/10 p-2 rounded-lg text-amber-400 shrink-0"><i data-lucide="${f.type === 'select' ? 'list-collapse' : 'type'}"></i></div>
                                            <div>
                                                <h4 class="text-white font-bold text-sm md:text-base">${f.label} ${f.required ? '<span class="text-rose-400 text-xs">(إجباري)</span>' : ''}</h4>
                                                <p class="text-slate-400 text-xs">القسم: ${f.section} | النوع: ${f.type}</p>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-2 w-full md:w-auto justify-end">
                                            <button onclick="JobApp.actions.toggleFieldVisibility('${f.id}')" class="px-4 py-2 rounded-lg text-xs font-bold border transition-colors flex-1 md:flex-none ${f.visible ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30 hover:bg-emerald-500/30' : 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700'}">${f.visible ? 'ظاهر للعامة' : 'مخفي'}</button>
                                            <button onclick="JobApp.actions.deleteField('${f.id}')" class="bg-rose-500/10 hover:bg-rose-600 text-rose-400 hover:text-white p-2.5 rounded-lg border border-rose-500/30 transition-colors" title="حذف الحقل"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        `;
                    }
                    
                    return `
                    <div class="max-w-7xl mx-auto px-4 pt-6 md:pt-10 pb-16 fade-in">
                        <!-- Navigation for Admin Tabs -->
                        <div class="flex flex-wrap gap-2 mb-6 md:mb-8 bg-black/30 p-2 md:p-3 rounded-2xl border border-white/5 overflow-x-auto hide-scrollbar shadow-inner">
                            ${admin.type === 'super_admin' ? `<button onclick="JobAppState.adminTab='system_admins'; JobApp.render()" class="whitespace-nowrap flex-1 md:flex-none px-4 md:px-6 py-3 rounded-xl font-bold transition-all text-xs md:text-sm flex items-center justify-center gap-2 ${JobAppState.adminTab==='system_admins'?'bg-emerald-600 text-white shadow-lg':'text-slate-400 hover:bg-white/5 hover:text-white'}"><i data-lucide="shield"></i> المدراء والإعدادات</button>` : ''}
                            <button onclick="JobAppState.adminTab='requests'; JobApp.render()" class="whitespace-nowrap flex-1 md:flex-none px-4 md:px-6 py-3 rounded-xl font-bold transition-all text-xs md:text-sm flex items-center justify-center gap-2 ${JobAppState.adminTab==='requests'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:bg-white/5 hover:text-white'}"><i data-lucide="briefcase"></i> الطلبات الواردة <span class="bg-blue-800 text-white px-2 py-0.5 rounded-full text-[10px] ml-1">${JobAppState.requests.length}</span></button>
                            <button onclick="JobAppState.adminTab='users'; JobAppState.usersSubTab='seekers'; JobApp.render()" class="whitespace-nowrap flex-1 md:flex-none px-4 md:px-6 py-3 rounded-xl font-bold transition-all text-xs md:text-sm flex items-center justify-center gap-2 ${JobAppState.adminTab==='users'?'bg-purple-600 text-white shadow-lg':'text-slate-400 hover:bg-white/5 hover:text-white'}"><i data-lucide="users"></i> قاعدة البيانات</button>
                            ${admin.type === 'super_admin' ? `<button onclick="JobAppState.adminTab='settings_form'; JobApp.render()" class="whitespace-nowrap flex-1 md:flex-none px-4 md:px-6 py-3 rounded-xl font-bold transition-all text-xs md:text-sm flex items-center justify-center gap-2 ${JobAppState.adminTab==='settings_form'?'bg-amber-600 text-white shadow-lg':'text-slate-400 hover:bg-white/5 hover:text-white'}"><i data-lucide="plus-square"></i> مصمم الاستمارة</button>` : ''}
                        </div>
                        ${tabContent}
                    </div>`;
                },

                success() {
                    let pdfBtnHtml = '';
                    if(JobAppState.lastSubmittedSeeker) {
                        pdfBtnHtml = `
                        <button onclick="JobApp.actions.downloadPDF()" class="mt-4 bg-emerald-600 text-white font-bold px-6 md:px-8 py-3 md:py-4 rounded-xl w-full hover:bg-emerald-500 flex items-center justify-center gap-2 shadow-lg transition-all hover:-translate-y-1 text-sm md:text-base">
                            <i data-lucide="download" class="w-4 h-4 md:w-5 md:h-5"></i> تحميل الاستمارة (PDF)
                        </button>
                        `;
                    }
                    return `
                    <div class="flex items-center justify-center min-h-[60vh] p-4 fade-in">
                        <div class="glass-panel p-8 md:p-12 rounded-3xl text-center max-w-lg w-full border border-green-500/30 shadow-[0_0_50px_rgba(34,197,94,0.2)]">
                            <i data-lucide="check-circle-2" class="w-16 h-16 md:w-20 md:h-20 text-green-400 mx-auto mb-4 md:mb-6"></i>
                            <h2 class="text-2xl md:text-3xl font-black text-white mb-4">تمت العملية بنجاح!</h2>
                            <p class="text-slate-300 mb-8">تم حفظ وتحديث بياناتك في المنصة.</p>
                            ${pdfBtnHtml}
                            <button onclick="JobApp.navigate('seeker_profile')" class="mt-4 bg-blue-600 text-white font-bold px-6 md:px-8 py-3 md:py-4 rounded-xl w-full hover:bg-blue-500 flex items-center justify-center gap-2 shadow-lg transition-all hover:-translate-y-1 text-sm md:text-base">
                                <i data-lucide="user" class="w-4 h-4 md:w-5 md:h-5"></i> العودة لملفي الشخصي
                            </button>
                        </div>
                    </div>`;
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => { 
            window.JobApp.init(); 
        });

    </script>
</body>
</html>
