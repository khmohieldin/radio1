<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة توظيف المصرية لخدمات الموارد البشرية وظفنى.كوم _ wzfny.com</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- html2pdf Library for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Custom Cosmic & Neon Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050814;
            color: white;
            overflow-x: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }
        
        input, textarea, select {
            user-select: text;
            -webkit-user-select: text;
            font-size: 16px !important; 
        }
        
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #050814; } 
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .stars-bg { 
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0)); 
            background-repeat: repeat; 
            background-size: 200px 200px; 
            opacity: 0.3; 
        }
        
        @keyframes neon-glow-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(59,130,246, 0.4), inset 0 0 10px rgba(59,130,246, 0.2); border-color: rgba(59,130,246, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(168,85,247, 0.8), inset 0 0 15px rgba(168,85,247, 0.4); border-color: rgba(168,85,247, 0.8); transform: scale(1.02); }
        }
        .ad-card { animation: neon-glow-pulse 4s infinite alternate ease-in-out; }
        .ad-card:nth-child(even) { animation-delay: -2s; animation-direction: alternate-reverse; }

        @keyframes ticker-ltr {
            from { transform: translateX(-100vw); }
            to { transform: translateX(100vw); }
        }
        .animate-ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker-ltr linear infinite;
        }
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            display: flex;
            align-items: center;
        }

        .glass-panel {
            background: rgba(11, 20, 55, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="selection:bg-blue-500 selection:text-white">

    <div class="fixed inset-0 pointer-events-none z-0 stars-bg"></div>
    <div class="fixed top-[-10%] right-[-10%] w-[50rem] h-[50rem] rounded-full bg-blue-900/40 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] left-[-10%] w-[60rem] h-[60rem] rounded-full bg-purple-900/30 blur-[150px] pointer-events-none z-0"></div>

    <!-- UI Container -->
    <div id="app" class="relative z-10 min-h-screen flex flex-col"></div>

    <!-- Firebase Integration as Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, setDoc, getDoc, onSnapshot, getDocs, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-E7BLDMOeysO8LaMwsuCF1kDbbmeQtzU",
            authDomain: "wzafny-7b4e3.firebaseapp.com",
            projectId: "wzafny-7b4e3",
            storageBucket: "wzafny-7b4e3.firebasestorage.app",
            messagingSenderId: "736863444532",
            appId: "1:736863444532:web:2a3b9881dd3fa51757b461",
            measurementId: "G-V06FDTKW19"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.db = db;

        const fullDefaultFields = [
            { id: 'f1', section: 'personal', label: 'الاسم بالكامل "ثلاثى"', type: 'text', required: true, visible: true },
            { id: 'f2', section: 'personal', label: 'عام الميلاد', type: 'number', required: true, visible: true },
            { id: 'f3', section: 'personal', label: 'الرقم القومى (14 رقم)', type: 'text', required: true, visible: true },
            { id: 'f4', section: 'personal', label: 'الحالة الاجتماعية', type: 'select', options: ['أعزب', 'متزوج', 'أخرى'], required: true, visible: true },
            { id: 'f5', section: 'personal', label: 'الموقف من التجنيد أو الخدمة العامة', type: 'select', options: ['أدى الخدمة', 'إعفاء نهائى', 'إعفاء مؤقت', 'غير مطلوب .. "للبنات فقط"'], required: true, visible: true },
            { id: 'f6', section: 'personal', label: 'الحالة الصحية', type: 'text', required: true, visible: true },
            { id: 'f7', section: 'contact', label: 'عنوان بريد إلكتروني', type: 'email', required: true, visible: true },
            { id: 'f8', section: 'contact', label: 'رقم المحمول الأساسي', type: 'tel', required: true, visible: true },
            { id: 'f9', section: 'contact', label: 'رقم محمول آخر', type: 'tel', required: true, visible: true },
            { id: 'f9_name', section: 'contact', label: 'اسم صاحب الرقم الآخر', type: 'text', required: true, visible: true },
            { id: 'f10', section: 'contact', label: 'واتساب', type: 'tel', required: true, visible: true },
            { id: 'f31', section: 'contact', label: 'رابط حساب فيسبوك (اختياري)', type: 'text', required: false, visible: true },
            { id: 'f11', section: 'contact', label: 'العنوان بالتفصيل', type: 'textarea', required: true, visible: true },
            { id: 'f12', section: 'qualifications', label: 'المؤهل', type: 'select', options: ['بدون', 'دبلوم', 'معهد', 'كلية'], required: true, visible: true },
            { id: 'f13', section: 'qualifications', label: 'المؤهل والتخصص الدقيق', type: 'text', required: true, visible: true },
            { id: 'f14', section: 'qualifications', label: 'تاريخ التخرج', type: 'date', required: true, visible: true },
            { id: 'f15', section: 'experience', label: 'الوظيفة المطلوبة', type: 'text', required: true, visible: true },
            { id: 'f16', section: 'experience', label: 'الراتب المتوقع', type: 'text', required: true, visible: true },
            { id: 'f17', section: 'experience', label: 'الوظيفة الأولى', type: 'text', required: false, visible: true },
            { id: 'f18', section: 'experience', label: 'الوظيفة الثانية', type: 'text', required: false, visible: true },
            { id: 'f19', section: 'experience', label: 'الوظيفة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f20', section: 'experience', label: 'كم عدد الوظائف السابقة', type: 'number', required: false, visible: true },
            { id: 'f21', section: 'experience', label: 'كم عاما قضيتها فى سوق العمل؟', type: 'number', required: true, visible: true },
            { id: 'f22', section: 'skills', label: 'درجة إجادة اللغة الإنجليزية؟', type: 'select', options: ['ضعيف', 'مقبول', 'جيد', 'جيد جدًا', 'ممتاز'], required: true, visible: true },
            { id: 'f23', section: 'skills', label: 'هل تجيد لغات أخرى؟', type: 'text', required: true, visible: true },
            { id: 'f24', section: 'skills', label: 'هل تجيد قيادة السيارات أو الدراجات النارية؟', type: 'select', options: ['نعم', 'لا', 'إلى حدٍ ما'], required: true, visible: true },
            { id: 'f25', section: 'skills', label: 'هل لديك رخصة قيادة؟', type: 'select', options: ['نعم', 'لا'], required: true, visible: true },
            { id: 'f26', section: 'skills', label: 'المهارة/الخبرة الأولى', type: 'text', required: false, visible: true },
            { id: 'f27', section: 'skills', label: 'المهارة/الخبرة الثانية', type: 'text', required: false, visible: true },
            { id: 'f28', section: 'skills', label: 'المهارة/الخبرة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f29', section: 'skills', label: 'هل لديك أى معلومات أو مهارات ترغب فى إضافتها؟', type: 'textarea', required: true, visible: true },
            { id: 'f30', section: 'bonus', label: 'رشح أحد أصدقائك (اسمه ورقم تليفونه)', type: 'text', required: false, visible: true }
        ];

        // --- State Management ---
        window.JobAppState = {
            isOffline: false, 
            view: 'home',
            authMode: 'login', 
            
            siteSettings: {
                name: 'منصة توظيف المصرية لخدمات الموارد البشرية وظفنى.كوم _ wzfny.com', 
                logo: '', 
                adminName: 'خالد محي الدين', 
                adminRole: 'مدير الموقع', 
                adminPhone: '01144800777', 
                adminEmail: 'khmohieldin@gmail.com', 
                aboutUs: 'منصة توظيف المصرية هي المنصة الأولى من نوعها...', 
                seekerPortalImg: '', 
                employerPortalImg: '', 
                tickerEnabled: true, 
                tickerSpeed: 30, 
                tickerMode: 'auto', 
                tickerManualText: '',
                visitorsCount: 1500 // عداد مبدئي
            },
            
            secretClickCount: 0,
            loggedInAdmin: null,
            adminRecoveryMode: false,
            loggedInUser: null,
            preRegData: { role: 'seeker' }, 
            
            tempSeekerImage: '',
            tempIdImage: '',
            tempCertImage: '',
            tempAdImage: '',
            tempRating: 0,
            lastSubmittedSeeker: null, 

            adFormType: 'external',
            adminAddUserRole: 'seeker', 
            modals: { login: false, request: false, rating: false, adDetails: false, adminRequestDetails: null, userDetails: null, adminAddUser: false, bulkAdd: false },
            selectedItem: null, 
            search: { term: '', filterJob: 'الكل', filterExp: 'الكل' },
            adminTab: 'system_admins',
            usersSubTab: 'seekers',

            // Data Arrays
            systemAdmins: [{ id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '01144800777', password: '123456', type: 'super_admin', profileImage: '', color: 'green' }],
            messages: [], 
            formFields: [...fullDefaultFields], 
            seekers: [],
            employers: [],
            requests: [],
            ads: []
        };

        // --- Global Secret Click Listener ---
        window.secretClickTimer = null;
        document.addEventListener('click', function(e) {
            if (JobAppState.modals.login || JobAppState.loggedInAdmin) return;
            const isInteractive = e.target.closest('button, a, input, select, textarea, label, [onclick]');
            if (isInteractive) return;

            JobAppState.secretClickCount++;
            clearTimeout(window.secretClickTimer);
            window.secretClickTimer = setTimeout(function() { JobAppState.secretClickCount = 0; }, 3000);

            if (JobAppState.secretClickCount >= 5) {
                JobAppState.secretClickCount = 0;
                JobAppState.modals.login = true;
                JobApp.render();
            }
        });

        // --- Firebase Initial Seeder & Visitor Counter ---
        async function seedDefaultsAndCount() {
            try {
                const settingsRef = doc(db, 'settings', 'global');
                const settingsSnap = await getDoc(settingsRef);
                
                if(!settingsSnap.exists()) {
                    await setDoc(settingsRef, JobAppState.siteSettings);
                } else {
                    // Increment visitor count
                    await updateDoc(settingsRef, { visitorsCount: increment(1) });
                }

                const adminsSnap = await getDocs(collection(db, 'systemAdmins'));
                if(adminsSnap.empty) {
                    await addDoc(collection(db, 'systemAdmins'), JobAppState.systemAdmins[0]);
                }
                const fieldsSnap = await getDocs(collection(db, 'formFields'));
                if(fieldsSnap.empty || fieldsSnap.size < 15) {
                    for(let f of fullDefaultFields) {
                        await setDoc(doc(db, 'formFields', f.id), f);
                    }
                }
            } catch (e) { console.log("Seeding skipped due to network/rules", e); }
        }

        // --- Core Framework ---
        window.JobApp = {
            renderTimer: null,
            init: async function() {
                this.syncSession(); 
                this.render(); 

                try {
                    if (window.location.protocol === 'file:') throw new Error("PROTOCOL_ERROR");
                    await signInAnonymously(auth);
                    await seedDefaultsAndCount();
                    
                    onSnapshot(doc(db, 'settings', 'global'), doc => { if(doc.exists()) { JobAppState.siteSettings = doc.data(); this.syncSession(); this.render(); }});
                    onSnapshot(collection(db, 'systemAdmins'), snap => { JobAppState.systemAdmins = snap.docs.map(d => ({id: d.id, ...d.data()})); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'formFields'), snap => { JobAppState.formFields = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a, b) => parseInt(a.id.replace('f', '')) - parseInt(b.id.replace('f', ''))); this.render(); });
                    onSnapshot(collection(db, 'seekers'), snap => { JobAppState.seekers = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.rating - a.rating); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'employers'), snap => { JobAppState.employers = snap.docs.map(d => ({id: d.id, ...d.data()})); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'requests'), snap => { JobAppState.requests = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'ads'), snap => { JobAppState.ads = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'messages'), snap => { JobAppState.messages = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });

                } catch(e) {
                    JobAppState.isOffline = true;
                    JobAppState.siteSettings.visitorsCount++; // Offline mockup
                    this.render(); 
                }
            },
            
            syncSession: function() {
                if (JobAppState.loggedInUser) {
                    if (JobAppState.loggedInUser.role === 'seeker') {
                        const updated = JobAppState.seekers.find(s => s.id === JobAppState.loggedInUser.id);
                        if (updated) JobAppState.loggedInUser = { ...updated, role: 'seeker' };
                    } else if (JobAppState.loggedInUser.role === 'employer') {
                        const updated = JobAppState.employers.find(e => e.id === JobAppState.loggedInUser.id);
                        if (updated) JobAppState.loggedInUser = { ...updated, role: 'employer' };
                    }
                } else {
                    const uAuth = localStorage.getItem('wzafny_user');
                    if (uAuth) {
                        try {
                            const { id, role } = JSON.parse(uAuth);
                            if (role === 'seeker') {
                                const s = JobAppState.seekers.find(x => x.id === id);
                                if (s) JobAppState.loggedInUser = { ...s, role };
                            } else if (role === 'employer') {
                                const e = JobAppState.employers.find(x => x.id === id);
                                if (e) JobAppState.loggedInUser = { ...e, role };
                            }
                        } catch(e) {}
                    }
                }

                if (JobAppState.loggedInAdmin) {
                    const updated = JobAppState.systemAdmins.find(a => a.id === JobAppState.loggedInAdmin.id);
                    if(updated) JobAppState.loggedInAdmin = updated;
                } else {
                    const aAuth = localStorage.getItem('wzafny_admin');
                    if (aAuth) {
                        try {
                            const { email, pass } = JSON.parse(aAuth);
                            const a = JobAppState.systemAdmins.find(x => x.email === email && x.password === pass);
                            if (a) JobAppState.loggedInAdmin = a;
                        } catch(e) {}
                    }
                }
            },

            render: function() {
                if (this.renderTimer) clearTimeout(this.renderTimer);
                this.renderTimer = setTimeout(() => this._doRender(), 50);
            },

            _doRender: function() {
                const appDiv = document.getElementById('app');
                if (!appDiv) return;

                let currentViewHtml = '';
                if (this.views && typeof this.views[JobAppState.view] === 'function') {
                    currentViewHtml = this.views[JobAppState.view]();
                } else {
                    currentViewHtml = this.views.home();
                }

                appDiv.innerHTML = `
                    ${this.components.Header()}
                    <main class="flex-grow pb-20">
                        ${currentViewHtml}
                    </main>
                    ${this.components.Modals()}
                `;
                
                if (window.lucide) { lucide.createIcons(); }
            },
            navigate: function(view) {
                JobAppState.view = view;
                this.render();
                window.scrollTo(0, 0);
            },
            whatsappLink: function(phone) {
                if (!phone) return '#';
                let f = phone.replace(/\D/g, '');
                if (f.startsWith('01')) f = '2' + f;
                return `https://wa.me/${f}`;
            },

            // --- Actions ---
            actions: {
                adminLogin(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    const admin = JobAppState.systemAdmins.find(a => a.email === email && a.password === pass);
                    if (admin) {
                        JobAppState.loggedInAdmin = admin;
                        localStorage.setItem('wzafny_admin', JSON.stringify({ email: admin.email, pass: admin.password })); 
                        JobAppState.modals.login = false;
                        JobAppState.adminRecoveryMode = false;
                        JobApp.navigate('admin_dashboard');
                    } else {
                        alert('بيانات الدخول غير صحيحة!');
                    }
                },
                adminRecoverySubmit(e) {
                    e.preventDefault();
                    alert('تم إرسال رابط استعادة كلمة المرور إلى البريد الإلكتروني للمدير بنجاح!');
                    JobAppState.adminRecoveryMode = false;
                    JobApp.render();
                },
                startAuth(mode, role = 'seeker') {
                    JobAppState.authMode = mode;
                    JobAppState.preRegData.role = role;
                    JobApp.navigate('auth');
                },
                userLoginSubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    
                    let user = JobAppState.seekers.find(s => s.email === email && s.password === pass);
                    if (user) {
                        JobAppState.loggedInUser = { ...user, role: 'seeker' };
                        localStorage.setItem('wzafny_user', JSON.stringify({ id: user.id, role: 'seeker' }));
                        JobAppState.modals.userLogin = false;
                        JobApp.navigate('seeker_profile'); // Go to profile first to see details/edit option
                        return;
                    }
                    
                    user = JobAppState.employers.find(emp => emp.email === email && emp.password === pass);
                    if (user) {
                        JobAppState.loggedInUser = { ...user, role: 'employer' };
                        localStorage.setItem('wzafny_user', JSON.stringify({ id: user.id, role: 'employer' }));
                        JobAppState.modals.userLogin = false;
                        JobApp.navigate('employer_form');
                        return;
                    }
                    
                    alert('البريد الإلكتروني أو كلمة المرور غير صحيحة.');
                },
                userLogout() {
                    JobAppState.loggedInUser = null;
                    JobAppState.loggedInAdmin = null;
                    localStorage.removeItem('wzafny_user');
                    localStorage.removeItem('wzafny_admin');
                    JobApp.navigate('home');
                },
                async submitRegister(e) {
                    e.preventDefault();
                    const name = e.target.name.value;
                    const email = e.target.email.value;
                    const password = e.target.password.value;
                    const role = e.target.role.value;
                    const refCodeInput = e.target.refCode ? e.target.refCode.value.trim() : '';
                    
                    if(JobAppState.seekers.some(s => s.email === email) || JobAppState.employers.some(emp => emp.email === email)) {
                        return alert("هذا البريد الإلكتروني مستخدم بالفعل. يرجى تسجيل الدخول.");
                    }

                    // نظام نقاط دعوة الأصدقاء
                    let awardedPoints = 0;
                    if (refCodeInput && refCodeInput.startsWith('WZF-')) {
                        const refId = refCodeInput.replace('WZF-', '');
                        const referrer = JobAppState.seekers.find(s => s.id.startsWith(refId));
                        if(referrer && !JobAppState.isOffline) {
                            try {
                                await updateDoc(doc(db, 'seekers', referrer.id), { points: (referrer.points || 0) + 10 });
                                awardedPoints = 10;
                            } catch(e){}
                        }
                    }

                    if (role === 'seeker') {
                        const newSeeker = { name, email, password, phone: '', profileImage: '', idImage: '', certImage: '', isVisible: false, isHired: false, rating: 0, reviewsCount: 0, jobTitle: '', experience: 0, skills: [], points: awardedPoints };
                        if (!JobAppState.isOffline) {
                            try {
                                const docRef = await addDoc(collection(db, 'seekers'), newSeeker);
                                JobAppState.loggedInUser = { id: docRef.id, ...newSeeker, role: 'seeker' };
                            } catch(err) { return alert("خطأ: " + err.message); }
                        } else {
                            newSeeker.id = Date.now().toString();
                            JobAppState.seekers.unshift(newSeeker);
                            JobAppState.loggedInUser = { ...newSeeker, role: 'seeker' };
                        }
                        localStorage.setItem('wzafny_user', JSON.stringify({ id: JobAppState.loggedInUser.id, role: 'seeker' }));
                        JobApp.navigate('seeker_form'); 

                    } else {
                        const newEmp = { name, email, password, phone: '', profileImage: '', date: new Date().toLocaleDateString('ar-EG'), points: awardedPoints, requestsCount: 0 };
                        if (!JobAppState.isOffline) {
                            try {
                                const docRef = await addDoc(collection(db, 'employers'), newEmp);
                                JobAppState.loggedInUser = { id: docRef.id, ...newEmp, role: 'employer' };
                            } catch(err) { return alert("خطأ: " + err.message); }
                        } else {
                            newEmp.id = Date.now().toString();
                            JobAppState.employers.unshift(newEmp);

                setTempRating(val) { JobAppState.tempRating = val; JobApp.render(); },
                async submitRating(e) {
                    e.preventDefault();
                    const stars = JobAppState.tempRating;
                    const feedback = e.target.feedback.value;
                    if(stars < 1 || stars > 5) return alert("اختر النجوم أولاً");
                    const req = JobAppState.selectedItem;
                    const emp = JobAppState.employers.find(x => x.id === JobAppState.loggedInUser.id);
                    const seeker = JobAppState.seekers.find(s => s.id === req.seeker.id);

                    try {
                        if (!JobAppState.isOffline) {
                            await updateDoc(doc(db, 'requests', req.id), { isRated: true, ratingGiven: stars, ratingFeedback: feedback });
                            if(emp) await updateDoc(doc(db, 'employers', emp.id), { points: emp.points + 5 });
                            if(seeker) {
                                const newCount = seeker.reviewsCount + 1;
                                const newRating = Number((((seeker.rating * seeker.reviewsCount) + stars) / newCount).toFixed(1));
                                await updateDoc(doc(db, 'seekers', seeker.id), { reviewsCount: newCount, rating: newRating });
                            }
                        } else {
                            req.isRated = true; req.ratingGiven = stars; req.ratingFeedback = feedback;
                            if(emp) emp.points += 5;
                            if(seeker) { seeker.reviewsCount++; seeker.rating = Number((((seeker.rating * (seeker.reviewsCount - 1)) + stars) / seeker.reviewsCount).toFixed(1)); }
                        }
                        JobAppState.modals.rating = false; alert('تم التقييم وإضافة 5 نقاط لشركتك!'); JobApp.render();
                    } catch(err) {}
                },

                uploadImage(inputElement, callbackKey) {
                    const file = inputElement.files[0];
                    if(!file) return;
                    const reader = new FileReader();
                    reader.onload = event => {
                        const img = new Image(); img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas'); const MAX_WIDTH = 600;
                            let width = img.width; let height = img.height;
                            if (width > MAX_WIDTH) { height = height * (MAX_WIDTH / width); width = MAX_WIDTH; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 

                            if(callbackKey === 'siteLogo') { JobAppState.siteSettings.logo = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'seekerPortalImg') { JobAppState.siteSettings.seekerPortalImg = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'employerPortalImg') { JobAppState.siteSettings.employerPortalImg = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempSeekerImage') { JobAppState.tempSeekerImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempIdImage') { JobAppState.tempIdImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempCertImage') { JobAppState.tempCertImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempAdImage') { JobAppState.tempAdImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'employerProfileImage') {
                                const emp = JobAppState.employers.find(e => e.id === JobAppState.loggedInUser.id);
                                if(emp) {
                                    emp.profileImage = compressedBase64;
                                    if(!JobAppState.isOffline) updateDoc(doc(db, 'employers', emp.id), { profileImage: compressedBase64 }).catch(e=>{});
                                }
                                JobAppState.loggedInUser.profileImage = compressedBase64; JobApp.render();
                            }
                        }
                    }
                    reader.readAsDataURL(file);
                },

                                    <div><label class="block text-xs font-bold text-purple-200 mb-1">مجال العمل / النشاط</label><input name="industry" value="${user.industry||''}" class="w-full px-3 py-2.5 rounded-lg bg-black/30 border border-white/20 text-white"></div>
                                    <div><label class="block text-xs font-bold text-purple-200 mb-1">عدد الموظفين التقريبي</label><input name="employeeCount" value="${user.employeeCount||''}" type="number" class="w-full px-3 py-2.5 rounded-lg bg-black/30 border border-white/20 text-white"></div>
                                    <div><label class="block text-xs font-bold text-purple-200 mb-1">المدينة / المقر الرئيسي</label><input name="city" value="${user.city||''}" class="w-full px-3 py-2.5 rounded-lg bg-black/30 border border-white/20 text-white"></div>
                                </div>
                                <div><label class="block text-xs font-bold text-purple-200 mb-1">نبذة عن الشركة</label><textarea name="companyDesc" rows="3" class="w-full px-3 py-2.5 rounded-lg bg-black/30 border border-white/20 text-white">${user.companyDesc||''}</textarea></div>
                                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-3.5 rounded-xl shadow-lg mt-4">حفظ البيانات</button>
                            </form>
                        </div>
                        <div class="text-center"><button onclick="JobApp.navigate('employer_form')" class="bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-xl font-bold border border-white/20">تصفح الموظفين الآن <i data-lucide="arrow-left" class="inline w-4 h-4 mr-2"></i></button></div>
                    </div>`;
                },

                employer_form() {
                    const term = JobAppState.search.term || '';
                    const filterJob = JobAppState.search.filterJob;
                    const filterExp = JobAppState.search.filterExp;

                    // جلب الوظائف المتاحة للفلتر
                    const uniqueJobs = [...new Set(JobAppState.seekers.filter(s=>s.isVisible && s.jobTitle).map(s=>s.jobTitle))];

                    let seekersHtml = JobAppState.seekers.filter(s => {
                        if(!s.isVisible) return false;
                        if(filterJob !== 'الكل' && s.jobTitle !== filterJob) return false;
                        if(filterExp !== 'الكل' && s.experience < parseInt(filterExp)) return false;
                        if(term) {
                            const str = `${s.name} ${s.jobTitle} ${s.location} ${s.skills?.join(' ')}`.toLowerCase();
                            return str.includes(term);
                        }
                        return true;
                    }).map(s => {
                        // إظهار كافة التفاصيل ماعدا أرقام التواصل (f7, f8, f9, f10, f11)
                        let details = '';
                        if(s.formData) {
                            const exclude = ['f7','f8','f9','f9_name','f10','f11','f31','f1','f15']; // إخفاء التواصل والاسم/الوظيفة لأنها بالرأس
                            JobAppState.formFields.forEach(f => {
                                if(!exclude.includes(f.id) && s.formData[f.id]) {
                                    details += `<div class="bg-white/5 p-2 rounded border border-white/5"><div class="text-[10px] text-purple-300">${f.label}</div><div class="text-xs text-white font-bold">${s.formData[f.id]}</div></div>`;
                                }
                            });
                        }

                        return `
                        <div class="glass-panel p-6 rounded-3xl border ${s.isHired?'border-rose-500/30 grayscale':'border-purple-500/20'} relative shadow-lg">
                            ${s.isHired ? `<div class="absolute top-4 left-4 bg-rose-600 text-white text-xs px-2 py-1 rounded font-bold">تم التعاقد</div>` : ''}
                            <div class="flex gap-4 items-start mb-4">
                                <div class="w-16 h-16 rounded-xl bg-purple-500/10 border border-purple-500/30 overflow-hidden shrink-0">${s.profileImage?`<img src="${s.profileImage}" class="w-full h-full object-cover">`:'<i data-lucide="user" class="w-8 h-8 text-purple-400 mx-auto mt-4"></i>'}</div>
                                <div>
                                    <h4 class="text-xl font-black text-white">${s.name} <span class="bg-rose-500/10 text-rose-400 text-[10px] px-1 rounded border border-rose-500/20 font-normal">بيانات الاتصال مخفية</span></h4>
                                    <p class="text-purple-300 text-sm font-bold">${s.jobTitle}</p>
                                    <div class="text-xs text-amber-400 mt-1 flex items-center gap-1"><i data-lucide="star" class="w-3 h-3 fill-amber-400"></i> ${s.rating} (${s.reviewsCount} تقييم)</div>
                                </div>
                            </div>
                            ${details ? `<div class="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4">${details}</div>` : ''}
                            ${!s.isHired ? `<button onclick="JobApp.actions.openRequestModal('${s.id}')" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl shadow-lg mt-2">طلب تعيين وعرض الاتصال</button>` : ''}
                        </div>`;
                    }).join('');

                    return `
                    <div class="max-w-6xl mx-auto px-4 pt-8 pb-16 fade-in">
                        <div class="glass-panel p-6 rounded-3xl mb-8 border border-purple-500/30">
                            <div class="grid md:grid-cols-3 gap-4">
                                <div>
                                    <label class="block text-xs text-purple-200 mb-1">بحث حر</label>
                                    <input type="text" value="${term}" oninput="JobApp.actions.filterSeekers(event)" placeholder="ابحث بالاسم، المهارة..." class="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/10 text-white outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs text-purple-200 mb-1">فلتر بالمسمى الوظيفي</label>
                                    <select onchange="JobApp.actions.setSearchFilter('filterJob', this.value)" class="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/10 text-white outline-none">
                                        <option value="الكل">الكل</option>
                                        ${uniqueJobs.map(j => `<option value="${j}" ${filterJob===j?'selected':''}>${j}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-purple-200 mb-1">الحد الأدنى للسنوات (خبرة)</label>
                                    <select onchange="JobApp.actions.setSearchFilter('filterExp', this.value)" class="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/10 text-white outline-none">
                                        <option value="الكل">الكل</option>
                                        <option value="1" ${filterExp==='1'?'selected':''}>1+ سنة</option>
                                        <option value="3" ${filterExp==='3'?'selected':''}>3+ سنوات</option>
                                        <option value="5" ${filterExp==='5'?'selected':''}>5+ سنوات</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="grid md:grid-cols-2 gap-6">
                            ${seekersHtml || '<div class="col-span-2 text-center text-slate-500 p-10 bg-black/20 rounded-3xl border border-dashed border-slate-700">لا توجد نتائج مطابقة لبحثك.</div>'}
                        </div>
                    </div>`;
                },

                admin_dashboard() {
                    const admin = JobAppState.loggedInAdmin;
                    if(!admin) return '';

                    if(JobAppState.adminTab === 'users' && JobAppState.usersSubTab === 'employers') {
                        // Custom Excel-like Table for Employers
                        return `
                        <div class="p-6">
                            <div class="flex justify-between mb-4"><button onclick="JobAppState.adminTab='system_admins'; JobApp.render()" class="bg-white/10 px-4 py-2 rounded text-white text-sm">عودة للوحة</button><h2 class="text-xl text-white font-bold">جدول بيانات الشركات (Excel View)</h2></div>
                            <div class="overflow-x-auto border border-white/10 rounded-lg">
                                <table class="w-full text-right text-sm text-slate-300 border-collapse whitespace-nowrap">
                                    <thead class="bg-black/50 text-white">
                                        <tr><th class="p-3 border border-white/10">الشركة</th><th class="p-3 border border-white/10">الهاتف</th><th class="p-3 border border-white/10">الإيميل</th><th class="p-3 border border-white/10">سجل تجاري</th><th class="p-3 border border-white/10">المجال</th><th class="p-3 border border-white/10">مدينة</th><th class="p-3 border border-white/10">نقاط</th></tr>
                                    </thead>
                                    <tbody>
                                        ${JobAppState.employers.map(e => `
                                        <tr class="hover:bg-white/5 transition-colors">
                                            <td class="p-3 border border-white/10 font-bold text-purple-300">${e.name}</td>
                                            <td class="p-3 border border-white/10" dir="ltr">${e.phone}</td>
                                            <td class="p-3 border border-white/10">${e.email}</td>
                                            <td class="p-3 border border-white/10">${e.companyRegNum||'-'}</td>
                                            <td class="p-3 border border-white/10">${e.industry||'-'}</td>
                                            <td class="p-3 border border-white/10">${e.city||'-'}</td>
                                            <td class="p-3 border border-white/10 text-amber-400 font-bold">${e.points||0}</td>
                                        </tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>`;
                    }

                    // For seekers bulk add
                    let bulkBtn = JobAppState.usersSubTab === 'seekers' ? `<button onclick="JobAppState.modals.bulkAdd=true; JobApp.render()" class="bg-amber-600 text-white px-4 py-2 rounded font-bold text-sm mx-2">إضافة جماعية (CSV)</button>` : '';

                    return `
                    <div class="p-4 md:p-8 fade-in">
                        <div class="bg-[#0f172a] rounded-3xl border border-emerald-500/30 overflow-hidden shadow-2xl">
                            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-black/20">
                                <div><h2 class="text-2xl font-black text-emerald-400">لوحة الإدارة | ${admin.name}</h2><span class="text-xs text-slate-400">${admin.role}</span></div>
                                <button onclick="JobApp.actions.userLogout()" class="bg-rose-600/20 text-rose-400 px-4 py-2 rounded-lg font-bold">خروج</button>
                            </div>
                            <div class="flex overflow-x-auto border-b border-white/10 bg-black/40">
                                ${admin.type === 'super_admin' ? `<button onclick="JobAppState.adminTab='system_admins'; JobApp.render()" class="px-6 py-4 font-bold text-sm ${JobAppState.adminTab==='system_admins'?'text-emerald-400 border-b-2 border-emerald-400 bg-emerald-500/10':'text-slate-400'}">النظام والإعدادات</button>` : ''}
                                <button onclick="JobAppState.adminTab='requests'; JobApp.render()" class="px-6 py-4 font-bold text-sm ${JobAppState.adminTab==='requests'?'text-blue-400 border-b-2 border-blue-400 bg-blue-500/10':'text-slate-400'}">الطلبات</button>
                                <button onclick="JobAppState.adminTab='users'; JobAppState.usersSubTab='seekers'; JobApp.render()" class="px-6 py-4 font-bold text-sm ${JobAppState.adminTab==='users'?'text-purple-400 border-b-2 border-purple-400 bg-purple-500/10':'text-slate-400'}">المستخدمين</button>
                                ${admin.type === 'super_admin' ? `<button onclick="JobAppState.adminTab='settings_form'; JobApp.render()" class="px-6 py-4 font-bold text-sm ${JobAppState.adminTab==='settings_form'?'text-amber-400 border-b-2 border-amber-400 bg-amber-500/10':'text-slate-400'}">حقول الاستمارة</button>` : ''}
                            </div>
                            <div class="p-6">
                                ${JobAppState.adminTab==='users' ? `
                                    <div class="mb-4 pb-4 border-b border-white/10 flex items-center">
                                        <button onclick="JobAppState.usersSubTab='seekers'; JobApp.render()" class="px-4 py-2 rounded font-bold text-sm ${JobAppState.usersSubTab==='seekers'?'bg-blue-600 text-white':'text-slate-400'}">الموظفين</button>
                                        <button onclick="JobAppState.usersSubTab='employers'; JobApp.render()" class="px-4 py-2 rounded font-bold text-sm mx-2 ${JobAppState.usersSubTab==='employers'?'bg-purple-600 text-white':'text-slate-400'}">الشركات</button>
                                        ${bulkBtn}
                                    </div>
                                    <div class="grid gap-4">
                                        ${JobAppState.usersSubTab === 'seekers' ? 
                                            JobAppState.seekers.map(s => `<div class="bg-white/5 p-4 rounded-xl flex justify-between items-center"><div class="text-white font-bold">${s.name} - <span class="text-sm text-slate-400">${s.jobTitle}</span></div><div><button onclick="JobApp.actions.openUserDetails('seeker','${s.id}')" class="bg-blue-600 text-white px-3 py-1 rounded text-xs">التفاصيل / الصور</button></div></div>`).join('') 
                                        : ''}
                                    </div>
                                ` : ''}
                                ${JobAppState.adminTab==='system_admins' ? `
                                    <div class="bg-white/5 p-6 rounded-xl border border-white/10 max-w-lg mb-8">
                                        <h3 class="text-lg font-bold text-white mb-4">إضافة مدير جديد</h3>
                                        <form onsubmit="JobApp.actions.handleAddSystemAdmin(event)" class="space-y-4">
                                            <input name="name" required placeholder="الاسم" class="w-full p-2 rounded bg-black/40 text-white border border-white/20">
                                            <input name="email" type="email" required placeholder="البريد" class="w-full p-2 rounded bg-black/40 text-white border border-white/20">
                                            <input name="password" type="text" required placeholder="الرقم السري" class="w-full p-2 rounded bg-black/40 text-white border border-white/20">
                                            <select name="roleType" class="w-full p-2 rounded bg-black/40 text-white border border-white/20">
                                                <option value="super_admin">مدير عام (صلاحيات كاملة)</option>
                                                <option value="sub_admin">مسئول مساعد (طلبات ومستخدمين فقط)</option>
                                            </select>
                                            <button class="bg-emerald-600 text-white px-4 py-2 rounded font-bold">حفظ</button>
                                        </form>
                                    </div>
                                ` : ''}
                                ${JobAppState.adminTab==='requests' ? `
                                    <div class="grid gap-4">
                                        ${JobAppState.requests.map(r=>`<div class="bg-white/5 p-4 rounded-xl"><h4 class="text-white font-bold">طلب من شركة: ${r.employer.name}</h4><p class="text-slate-400 text-sm">للموظف: ${r.seeker.name||'--'}</p></div>`).join('') || '<p class="text-white">لا توجد طلبات</p>'}
                                    </div>
                                `:''}
                            </div>
                        </div>
                    </div>`;
                },

                contact() { return `<div class="p-20 text-center text-white font-bold">بوابة التواصل قيد العمل... يرجى الاتصال بالإدارة على ${JobAppState.siteSettings.adminPhone}</div>`; }
            }
        };

        document.addEventListener('DOMContentLoaded', () => { window.JobApp.init(); });

    </script>
</body>
</html>
